<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>タクシー帝国</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--surface:#fff;--border:#d2d2d7;--text:#1d1d1f;--sub:#6e6e73;--accent:#0071e3;--green:#34c759;--red:#ff3b30;--amber:#ff9500;--fn:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif}
body{font-family:var(--fn);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px;flex-shrink:0}
.tr1{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.game-title{font-weight:700;font-size:14px}
.game-time{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums}
.cash{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}.cash.neg{color:var(--red)}
.tr2{display:flex;align-items:center;justify-content:space-between;gap:4px}
.spg{display:flex;gap:1px;background:#f0f0f3;border-radius:8px;padding:2px}
.spb{background:none;border:none;padding:2px 5px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--sub)}
.spb.on{background:var(--surface);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.plbtn{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.plbtn.run{background:#d4f5df;color:#155724}.plbtn.stp{background:#f0f0f3;color:var(--text)}
.nbtn{position:relative;background:none;border:none;font-size:16px;cursor:pointer;padding:0 4px}
.nbadge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:9px;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center}
#tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto}
.tab{flex:1;min-width:46px;padding:8px 2px;text-align:center;font-size:10px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;border-top:none;border-left:none;border-right:none;background:none}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:#f0f6ff}
#main{flex:1;overflow-y:auto;padding:10px}
#sbar{background:var(--surface);border-top:1px solid var(--border);padding:4px 12px;display:flex;justify-content:space-between;font-size:10px;color:var(--sub);flex-shrink:0;gap:6px}
#sbar span{font-variant-numeric:tabular-nums;white-space:nowrap}
.pbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.pb-setup{background:#fff3cd;color:#856404}.pb-applied{background:#cce5ff;color:#004085}.pb-operating{background:#d4edda;color:#155724}.pb-gameover{background:#f8d7da;color:#721c24}
.season-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px}
.ct{font-weight:600;font-size:13px;margin-bottom:8px}
.ci{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f3;font-size:12px}
.ci:last-child{border-bottom:none}
.ci-ic{flex-shrink:0;font-size:14px}.ci-body{flex:1}
.ci-t{font-weight:500;margin-bottom:1px}.ci-d{font-size:11px;color:var(--sub)}.ci-law{font-size:10px;color:#ccc;margin-top:2px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.sb{background:var(--bg);border-radius:8px;padding:7px 9px}
.sl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
.sv.pos{color:var(--green)}.sv.neg{color:var(--red)}
.btn{display:inline-block;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}.btn-d{background:var(--red);color:#fff}.btn-s{background:#f0f0f3;color:var(--text)}
.btn-sm{padding:4px 9px;font-size:11px}.btn-bl{width:100%;display:block;text-align:center;margin-top:6px}
.stabs{display:flex;gap:2px;background:#f0f0f3;border-radius:8px;padding:2px;margin-bottom:10px}
.stab{flex:1;padding:4px;font-size:11px;border:none;background:none;color:var(--sub);border-radius:6px;cursor:pointer;text-align:center}
.stab.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.sc{border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px}
.sn{font-weight:600;font-size:13px}.sm{font-size:11px;color:var(--sub);margin-top:1px}
.arc-tag{display:inline-block;background:#f0f0f3;color:var(--sub);font-size:10px;padding:1px 6px;border-radius:4px;margin-top:3px}
.rt{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;margin-right:3px;margin-top:4px;cursor:pointer;border:none}
.rt-off{background:#f0f0f3;color:var(--sub)}.rt-dr{background:#e8f4fd;color:#0071e3}.rt-of{background:#fdf3e8;color:#d35400}.rt-op{background:#e8fdf3;color:#27ae60}.rt-ma{background:#fde8fd;color:#8e44ad}
.qb{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;margin-right:3px;margin-top:3px}
.qb-ok{background:#d4edda;color:#155724}.qb-ng{background:#f0f0f3;color:var(--sub)}
.sbw{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px}
.sr{display:flex;align-items:center;gap:4px;font-size:10px}
.sr-l{width:22px;color:var(--sub)}.sr-b{flex:1;height:3px;background:#f0f0f3;border-radius:2px;overflow:hidden}
.sr-f{height:100%;background:var(--accent)}.sr-v{width:20px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
.vc{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px}
.cbar{height:4px;background:#f0f0f3;border-radius:2px;overflow:hidden;margin-top:4px}.cbar-f{height:100%;border-radius:2px}
.ev-tag{display:inline-block;background:#ede9fe;color:#7c3aed;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px}
.lease-tag{display:inline-block;background:#fff0f6;color:#c2185b;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px}
.fr{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;font-variant-numeric:tabular-nums}
.fd{border-top:1px solid var(--border);margin:4px 0}.fi{padding-left:12px;color:var(--sub)}
.ib{border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;line-height:1.5}
.ib-ok{background:#d4edda;border:1px solid #c3e6cb;color:#155724}
.ib-warn{background:#fff3cd;border:1px solid #ffc107;color:#856404}
.ib-info{background:#cce5ff;border:1px solid #b8daff;color:#004085}
.ib-err{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24}
.apply-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:8px}
.apply-btn:disabled{background:#f0f0f3;color:var(--sub);cursor:not-allowed}
.apply-btn:not(:disabled){background:var(--accent);color:#fff}
.fac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.fac-item{border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px}
.fac-item.done{border-color:var(--green);background:#f0fff4}
.fac-item.locked{opacity:.6;background:#fafafa}
.comp-card{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px}
.comp-bar-wrap{height:8px;background:#f0f0f3;border-radius:4px;overflow:hidden;margin-top:4px;display:flex;gap:1px}
.comp-seg{height:100%}
.loan-row{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;font-size:12px}
.loan-meta{color:var(--sub);display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.bs-hdr{background:#f5f5f7;margin:8px -11px 4px;padding:3px 11px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.bs-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;font-variant-numeric:tabular-nums}
.bs-ind{padding-left:14px;color:var(--sub)}
.bs-total{display:flex;justify-content:space-between;border-top:2px solid var(--border);padding:5px 0;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.cf-row{display:flex;justify-content:space-between;padding:2px 4px;font-size:12px;font-variant-numeric:tabular-nums}
.cf-ind{padding-left:14px;color:var(--sub)}
.cf-sub{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding:4px;font-size:12px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
#np{position:absolute;inset:0;background:var(--surface);z-index:100;display:none;flex-direction:column}
#np.show{display:flex}
.nh{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px}
.nl{flex:1;overflow-y:auto;padding:8px 12px}
.ni{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f7}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.nd-info{background:var(--accent)}.nd-warn{background:var(--amber)}.nd-danger{background:var(--red)}
.nt{font-size:12px}.ntm{font-size:10px;color:var(--sub);margin-top:1px;font-variant-numeric:tabular-nums}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:380px}
.md-title{font-size:15px;font-weight:700;margin-bottom:10px}
select,input[type=number]{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;background:var(--surface);color:var(--text);font-family:var(--fn);width:100%}
</style>
</head>
<body>
<div id="app" style="height:100%;display:flex;flex-direction:column;position:relative">
  <div id="topbar">
    <div class="tr1">
      <span class="game-title">🚕 タクシー帝国</span>
      <span id="gtime" class="game-time"></span>
      <button class="nbtn" onclick="toggleNotif()">🔔<span id="nbadge" class="nbadge" style="display:none"></span></button>
    </div>
    <div class="tr2">
      <div class="spg">
        <button class="plbtn stp" id="plbtn" onclick="togglePlay()">⏸</button>
        <button class="spb" id="sp1"   onclick="setSpeed(1)">1x</button>
        <button class="spb" id="sp5"   onclick="setSpeed(5)">5x</button>
        <button class="spb" id="sp10"  onclick="setSpeed(10)">10x</button>
        <button class="spb" id="sp20"  onclick="setSpeed(20)">20x</button>
        <button class="spb" id="sp50"  onclick="setSpeed(50)">50x</button>
        <button class="spb" id="sp100" onclick="setSpeed(100)">100x</button>
        <button class="spb" id="sp150" onclick="setSpeed(150)">150x</button>
      </div>
      <span id="cashdsp" class="cash"></span>
    </div>
  </div>
  <div id="tabs">
    <button class="tab" id="tab-compliance" onclick="setTab('compliance')">法令</button>
    <button class="tab" id="tab-staff"      onclick="setTab('staff')">スタッフ</button>
    <button class="tab" id="tab-vehicles"   onclick="setTab('vehicles')">車両</button>
    <button class="tab" id="tab-facility"   onclick="setTab('facility')">施設</button>
    <button class="tab" id="tab-finance"    onclick="setTab('finance')">財務</button>
    <button class="tab" id="tab-market"     onclick="setTab('market')">市場</button>
  </div>
  <div id="main"></div>
  <div id="sbar">
    <div id="phasedsp"></div>
    <span id="seasondsp"></span>
    <span id="sright"></span>
  </div>
  <div id="np">
    <div class="nh"><span>通知</span><button class="btn btn-s btn-sm" onclick="toggleNotif()">閉じる</button></div>
    <div class="nl" id="nlist"></div>
  </div>
</div>

  {id:'disp', label:'元配車OP',          b:{d:5,sv:5,g:15,st:0,m:5},    oC:.25,mC:.05,ofC:.25},
  {id:'sale', label:'元営業・外回り',     b:{d:5,sv:15,g:10,st:0,m:8},   oC:.08,mC:.02,ofC:.12},
];

// ============================================================
// HELPERS
// ============================================================
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36).slice(-5);}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function yen(n){const v=Math.round(n);if(Math.abs(v)>=100000000)return`¥${(v/100000000).toFixed(2)}億`;if(Math.abs(v)>=10000)return`¥${(v/10000).toFixed(1)}万`;return`¥${v.toLocaleString()}`;}
function fmt(d){return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function skillMult(p,trainingBuilt){const bonus=trainingBuilt?1.05:1.0;return(0.5+(p.stats.driving+p.stats.service+p.stats.geo)/300)*(p.stats.motivation/100)*bonus;}
function loanMonthly(a,t){const r=0.025/12;return Math.round(a*r/(1-Math.pow(1+r,-t)));}
function calcCorpTax(p){if(p<=0)return 70000;const t=p<=8000000?p*.15:8000000*.15+(p-8000000)*.232;return Math.max(70000,Math.round(t*1.42));}

// ============================================================
// STATE
// ============================================================
function initState(){
  return{
    phase:'setup',time:new Date(2026,3,1,6,0),speed:1,running:false,
    tab:'compliance',staffTab:'hired',finTab:'pl',
    co:{name:'新星タクシー株式会社',cash:30000000},capitalStock:30000000,
    staff:[],candidates:genCandidates(10),
    vehicles:[],
    fac:{built:{},garageCapacity:0,mo:0,hasRest:false,extraGarages:0},
    permitApplied:null,permitReady:null,
    fin:{cur:newBucket(new Date(2026,3,1)),hist:[]},
    eco:{fuel:170,elec:28},
    loans:[],
    taxes:{ctAccrued:0,ctPaid:0,corpFYProfit:0,corpPaid:0,history:[]},
    cfAccum:{opIn:0,opOut:0,vPurchase:0,vSale:0,facPurchase:0,loanIn:0,loanPrincipal:0},
    competitors:COMP_DEFS.map(d=>({...d,share:d.initShare,vehicles:d.initVehicles,trend:0})),
    _confirm:null,
    notifs:[],nid:1,showNotif:false,
  };
}
function newBucket(d){return{month:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,rev:0,dPay:0,fuel:0,vmo:0,fmo:0,sal:0,socialIns:0,maint:0,depreciation:0,loanInterest:0,profit:null};}

function genCandidates(n){
  const list=Array.from({length:n},()=>{
    const arc=ARC[Math.floor(Math.random()*ARC.length)];
    const fem=Math.random()<.25;
    const bs={d:rnd(35,72),sv:rnd(30,70),g:rnd(30,72),st:rnd(45,80),m:rnd(55,85)};
    const stats={driving:clamp(bs.d+arc.b.d,10,99),service:clamp(bs.sv+arc.b.sv,10,99),geo:clamp(bs.g+arc.b.g,10,99),stamina:clamp(bs.st+arc.b.st,10,99),motivation:clamp(bs.m+arc.b.m,10,99)};
    const lp=arc.ofC>0&&Math.random()<arc.ofC;
    return{id:uid(),name:`${LAST[rnd(0,LAST.length-1)]} ${fem?FIRST_F[rnd(0,FIRST_F.length-1)]:FIRST_M[rnd(0,FIRST_M.length-1)]}`,
      age:rnd(24,65),exp:rnd(0,25),arc:arc.id,arcLabel:arc.label,
      lic2:arc.id!=='new'||Math.random()<.3,lawPassed:lp,canOfficer:lp,
      opsQ:Math.random()<arc.oC,maintQ:Math.random()<arc.mC,
      stats,salary:rnd(190000,330000),cr:.44+Math.random()*.13,roles:[],vehicleId:null};
  });
  if(!list.some(c=>c.opsQ)){const t=rnd(0,n-1);list[t]={...list[t],opsQ:true,arcLabel:list[t].arcLabel+' ★運行管理者'};}
  if(!list.some(c=>c.maintQ)){const t=rnd(0,n-1);list[t]={...list[t],maintQ:true,arcLabel:list[t].arcLabel+' ★整備管理者'};}
  if(!list.some(c=>c.canOfficer&&c.lawPassed)){const t=rnd(0,n-1);list[t]={...list[t],canOfficer:true,lawPassed:true,arcLabel:list[t].arcLabel+' ★役員候補'};}
  return list;
}

// ============================================================
// COMPLIANCE
// ============================================================
function comply(s){
  const vc=s.vehicles.length,st=s.staff;
  const hasOfficer=st.some(p=>p.roles.includes('officer')&&p.canOfficer&&p.lawPassed);
  const drivers=st.filter(p=>p.roles.includes('driver'));
  const dOk=drivers.length>=vc&&drivers.length>0&&drivers.every(p=>p.lic2);
  const hasOps=st.some(p=>p.roles.includes('opsmanager')&&p.opsQ);
  const needMaint=vc>=5,hasMaint=st.some(p=>p.roles.includes('maintmanager')&&p.maintQ);
  const maintOk=!needMaint||hasMaint,minV=vc>=5;
  const hasOffice=Object.keys(s.fac.built).some(k=>k.startsWith('office'));
  const facOk=hasOffice&&s.fac.garageCapacity>=vc&&s.fac.hasRest;
  const mo=s.vehicles.reduce((a,v)=>a+v.mo,0)+s.fac.mo+st.reduce((a,p)=>a+p.salary,0);
  const reqCap=Math.max(5000000,mo*3);
  const capOk=s.co.cash>=reqCap;
  return{
    officer:{ok:hasOfficer,detail:hasOfficer?'役員が専従・法令試験合格済':'法令試験合格済の専従役員が未選任',law:'道路運送法§9'},
    drivers:{ok:dOk,detail:`運転手${drivers.length}名 ／ 車両${vc}台`,law:'道路運送法：第二種運転免許・台数以上'},
    opsManager:{ok:hasOps,detail:hasOps?'運行管理者 選任済':'運行管理者（国家資格）が未選任',law:'道路運送法§23'},
    maintManager:{ok:maintOk,detail:needMaint?(hasMaint?'整備管理者 選任済':'整備管理者が未選任（5台以上のため必須）'):'現在不要',law:'道路運送車両法§50'},
    minVehicles:{ok:minV,detail:`${vc}台確保（最低5台）`,law:'国土交通省令'},
    facility:{ok:facOk,detail:!hasOffice?'営業所を確保してください':s.fac.garageCapacity<vc?`車庫容量不足(${s.fac.garageCapacity}台)`:!s.fac.hasRest?'休憩施設が必要です':'施設 確保済',law:'道路運送法：車庫2km以内・3年使用権原'},
    capital:{ok:capOk,detail:`保有${yen(s.co.cash)} ／ 必要${yen(reqCap)}`,law:'国土交通省：申請から許可まで100%確保'},
    all:hasOfficer&&dOk&&hasOps&&maintOk&&minV&&facOk&&capOk,
  };
}

// ============================================================
// GAME LOOP
// ============================================================
let G=initState(),timer=null;
function togglePlay(){if(G.phase==='gameover')return;G.running=!G.running;G.running?startTick():stopTick();render();}
function setSpeed(s){G.speed=s;if(G.running){stopTick();startTick();}render();}
function startTick(){if(timer)clearInterval(timer);let last=Date.now();timer=setInterval(()=>{const n=Date.now();tick(n-last);last=n;},500);}
function stopTick(){if(timer){clearInterval(timer);timer=null;}}

function tick(ms){
  if(!G.running||G.phase==='gameover')return;
  let rem=Math.floor((ms/1000)*6*G.speed),s=0;
  while(rem>0&&s++<50000){
    const step=Math.min(rem,60-G.time.getMinutes());
    G.time=new Date(G.time.getTime()+step*60000);rem-=step;
    if(G.time.getMinutes()===0)onHour();
    if(G.time.getDate()===1&&G.time.getHours()===0&&G.time.getMinutes()===0)onMonthEnd();
  }
  render();
}

function onHour(){
  if(G.phase==='applied'&&G.permitReady&&G.time>=G.permitReady){G.phase='operating';addN('info','許可が交付されました！🎉');}
  if(G.phase!=='operating')return;
  const h=G.time.getHours(),dem=DEM[h];
  const wm=(d=>d===5||d===6?1.15:d===0?.9:1.0)(G.time.getDay());
  const seasonMult=SEASONAL[G.time.getMonth()];
  const washBonus= G.fac.built.wash?1.05:1.0;
  const dispBonus= G.fac.built.dispatch?1.08:1.0;
  const evBonus=   G.fac.built.ev_chr?0.90:1.0;
  const trainBuilt=!!G.fac.built.training;
  let rev=0,dPay=0,fuel=0;
  G.vehicles=G.vehicles.map(v=>{
    const dr=G.staff.find(p=>p.id===v.driverId);if(!dr)return v;
    const m=VM[v.modelId],sm=skillMult(dr,trainBuilt),cm=0.6+(v.cond/100)*.4;
    const hr=BASE_REV*dem*wm*seasonMult*m.rm*sm*cm*washBonus*dispBonus;
    rev+=hr;dPay+=hr*dr.cr;
    const km=8+dem*10;
    fuel+=m.ev?km*m.kwhPkm*G.eco.elec*evBonus:(km/m.fuel)*G.eco.fuel;
    return{...v,mileage:v.mileage+km,cond:Math.max(0,v.cond-km*.002),totalRev:(v.totalRev||0)+hr};
  });
  G.co.cash+=rev-dPay-fuel;
  G.fin.cur.rev+=rev;G.fin.cur.dPay+=dPay;G.fin.cur.fuel+=fuel;
  if(G.time.getHours()===0){
    G.eco.fuel=Math.round(Math.max(140,Math.min(210,G.eco.fuel+(Math.random()-.5)*4))*10)/10;
    G.eco.elec=Math.round(Math.max(22,Math.min(38,G.eco.elec+(Math.random()-.5)*.8))*10)/10;
  }
  if(Math.random()<.0008){const c=comply(G);if(!c.all){G.co.cash-=500000;addN('danger','抜き打ち監査：違反。罰則金¥50万');}else addN('info','抜き打ち監査：問題なし ✓');}
  if(G.co.cash<-100000000){G.phase='gameover';G.running=false;stopTick();addN('danger','資金枯渇 — 破産');}
}

function onMonthEnd(){
  const b=G.fin.cur;
  const vmo=G.vehicles.reduce((a,v)=>a+v.mo,0);
  const fmo=G.fac.mo;
  const sal=G.staff.reduce((a,p)=>a+p.salary,0);
  const socialIns=Math.round(sal*SI_RATE);
  const maintRate=G.fac.built.maintshop?0.0008:0.001;
  const maint=Math.round(G.vehicles.reduce((a,v)=>a+(v.mileage/1000)*VM[v.modelId].price*maintRate,0));
  let depreciation=0;
  G.vehicles=G.vehicles.map(v=>{
    if(v.acquired!=='purchase')return v;
    const dep=(v.purchasePrice||0)/48;depreciation+=dep;
    return{...v,bookValue:Math.max(0,(v.bookValue||0)-dep)};
  });
  depreciation=Math.round(depreciation);
  let loanInterest=0,loanPrincipal=0;
  G.loans=G.loans.map(l=>{
    if(l.remaining<=0)return l;
    const interest=l.remaining*(0.025/12);const principal=Math.min(l.monthly-interest,l.remaining);
    loanInterest+=Math.round(interest);loanPrincipal+=Math.round(principal);
    G.co.cash-=Math.round(interest+principal);G.cfAccum.loanPrincipal+=Math.round(principal);
    return{...l,remaining:Math.max(0,l.remaining-principal)};
  }).filter(l=>l.remaining>0.01);
  G.co.cash-=vmo+fmo+sal+socialIns+maint;
  b.vmo=vmo;b.fmo=fmo;b.sal=sal;b.socialIns=socialIns;b.maint=maint;b.depreciation=depreciation;b.loanInterest=loanInterest;
  b.profit=Math.round(b.rev-b.dPay-b.fuel-vmo-fmo-sal-socialIns-maint-depreciation-loanInterest);
  G.cfAccum.opIn+=b.rev;G.cfAccum.opOut+=b.dPay+b.fuel+vmo+fmo+sal+socialIns+maint+loanInterest;
  G.fin.hist.push(b);G.fin.cur=newBucket(G.time);
  G.taxes.ctAccrued+=Math.round(b.rev*.036);
  G.taxes.corpFYProfit+=b.profit;
  const nm=G.time.getMonth();
  if([3,6,9,0].includes(nm)&&G.taxes.ctAccrued>0){
    const ct=Math.round(G.taxes.ctAccrued);G.co.cash-=ct;G.taxes.ctPaid+=ct;G.taxes.ctAccrued=0;
    G.cfAccum.opOut+=ct;G.taxes.history.push({type:'消費税',amount:ct,date:new Date(G.time)});addN('warn',`消費税 納付: ${yen(ct)}`);
  }
  if(nm===3&&G.phase==='operating'){
    const ct=calcCorpTax(G.taxes.corpFYProfit);G.co.cash-=ct;G.taxes.corpPaid+=ct;
    G.cfAccum.opOut+=ct;G.taxes.history.push({type:'法人税等',amount:ct,date:new Date(G.time)});
    addN('warn',`法人税等 申告: ${yen(ct)}`);G.taxes.corpFYProfit=0;
  }
  // 季節変動通知
  const nextMo=G.time.getMonth();
  const sm=SEASONAL[nextMo];
  const prevSm=SEASONAL[(nextMo+11)%12];
  const diff=((sm-prevSm)/prevSm*100).toFixed(0);
  const arrow=sm>prevSm?'📈':'📉';
  addN(sm>=1.0?'info':'warn',`${arrow} 季節変動：${SEASON_LBL[nextMo]}（需要係数×${sm.toFixed(2)}、前月比${diff>0?'+':''}${diff}%）`);
  updateCompetitors();
  G.candidates=genCandidates(10);
  G.staff=G.staff.map(p=>({...p,stats:{...p.stats,motivation:clamp(p.stats.motivation+(p.vehicleId?(Math.random()*4-1):-3),10,100)}}));
  addN(b.profit>=0?'info':'warn',`${b.month} 決算: ${b.profit>=0?'利益':'損失'} ${yen(Math.abs(b.profit))}`);
  if(G.co.cash<-100000000){G.phase='gameover';G.running=false;stopTick();addN('danger','資金枯渇 — 破産');}
}

function updateCompetitors(){
  const myVc=G.vehicles.filter(v=>v.driverId).length;
  G.competitors=G.competitors.map(c=>{
    const grow=Math.random()<c.aggression*.3;
    const shrink=Math.random()<.08;
    const vChange=grow?rnd(0,3):shrink?-rnd(0,1):0;
    const newV=Math.max(1,c.vehicles+vChange);
    const total=myVc+G.competitors.reduce((a,x)=>a+x.vehicles,0);
    const newShare=total>0?parseFloat((newV/total*100).toFixed(1)):c.share;
    if(Math.abs(vChange)>1)addN('info',`${c.name}: 車両${vChange>0?'+'+vChange:vChange}台（計${newV}台）`);
    return{...c,vehicles:newV,share:newShare,trend:newShare-c.share};
  });
}

// ============================================================
// ACTIONS
// ============================================================
function buyFac(fid){
  const f=FAC_CATALOG[fid];if(!f)return;
  if(f.req&&!G.fac.built[f.req]){addN('warn',`先に「${FAC_CATALOG[f.req].name}」を確保してください`);return;}
  if(G.co.cash<f.price){addN('warn','資金が不足しています');return;}
  G.co.cash-=f.price;G.fac.mo+=f.mo;G.fac.built[fid]=true;G.cfAccum.facPurchase+=f.price;
  if(f.cap>0&&f.cap>G.fac.garageCapacity)G.fac.garageCapacity=f.cap;
  if(fid==='rest')G.fac.hasRest=true;
  addN('info',`${f.name} を確保 (${yen(f.price)})`);render();
}

function expandGarage(){
  const n=G.fac.extraGarages||0;
  const addCap=50;
  const cost=Math.round(30000000*Math.pow(1.3,n));
  const mo=Math.round(800000*Math.pow(1.2,n));
  if(G.co.cash<cost){addN('warn','資金が不足しています');return;}
  askConfirm(`第${n+2}車庫増設（+${addCap}台）\n初期費用 ${yen(cost)}、月額 ${yen(mo)} で増設しますか？`,()=>{
    G.co.cash-=cost;G.fac.garageCapacity+=addCap;G.fac.mo+=mo;
    G.fac.extraGarages=(G.fac.extraGarages||0)+1;G.cfAccum.facPurchase+=cost;
    addN('info',`第${n+2}車庫増設完了 +${addCap}台 (計${G.fac.garageCapacity}台)`);
  });
}

function acquireVehicle(mid,acq){
  const m=VM[mid];const upfront=acq==='purchase'?m.price:0;const mo=acq==='purchase'?m.buyMo:m.leaseMo;
  if(G.co.cash<upfront){addN('warn','資金が不足しています');return;}
  if(G.fac.garageCapacity===0){addN('warn','先に車庫を確保してください（施設タブ）');return;}
  if(G.vehicles.length>=G.fac.garageCapacity){addN('warn','車庫の収容台数が上限です');return;}
  G.co.cash-=upfront;if(acq==='purchase')G.cfAccum.vPurchase+=upfront;
  G.vehicles.push({id:uid(),modelId:mid,acquired:acq,mo,mileage:0,cond:100,driverId:null,totalRev:0,purchasePrice:acq==='purchase'?m.price:0,bookValue:acq==='purchase'?m.price:0});
  addN('info',`${m.name} ${acq==='lease'?`リース 月額${yen(mo)}`:`購入 ${yen(upfront)}`}`);render();
}

function sellVehicle(vid){
  const v=G.vehicles.find(x=>x.id===vid);if(!v)return;
  const m=VM[v.modelId],isL=v.acquired==='lease',val=isL?0:Math.round(m.price*.5*(v.cond/100));
  askConfirm(`${m.name} を${isL?'リース解約':'売却'}しますか？${val>0?` (${yen(val)})`:'(返却金なし)'}`,()=>{
    if(v.driverId)G.staff=G.staff.map(p=>p.id===v.driverId?{...p,vehicleId:null}:p);
    G.vehicles=G.vehicles.filter(x=>x.id!==vid);G.co.cash+=val;if(!isL)G.cfAccum.vSale+=val;
    addN('info',`${m.name} ${isL?'リース解約':'売却'}${val>0?` (${yen(val)})`:''}`)});
}

function hireStaff(cid){
  const c=G.candidates.find(x=>x.id===cid);if(!c)return;
  G.staff.push({...c,roles:['driver'],vehicleId:null,hireDate:new Date(G.time)});
  G.candidates=G.candidates.filter(x=>x.id!==cid);addN('info',`${c.name} を採用`);render();
}

function fireStaff(sid){
  const p=G.staff.find(x=>x.id===sid);if(!p)return;
  askConfirm(`${p.name} を解雇しますか？`,()=>{
    if(p.vehicleId)G.vehicles=G.vehicles.map(v=>v.id===p.vehicleId?{...v,driverId:null}:v);
    G.staff=G.staff.filter(x=>x.id!==sid);addN('info',`${p.name} を解雇`);});
}

function toggleRole(sid,role){G.staff=G.staff.map(p=>{if(p.id!==sid)return p;const roles=p.roles.includes(role)?p.roles.filter(r=>r!==role):[...p.roles,role];return{...p,roles};});render();}
function assignVehicle(sid,vid){
  G.staff=G.staff.map(p=>{if(p.vehicleId===vid&&p.id!==sid)return{...p,vehicleId:null};if(p.id===sid)return{...p,vehicleId:vid||null};return p;});
  G.vehicles=G.vehicles.map(v=>{if(v.driverId===sid)return{...v,driverId:null};if(v.id===vid)return{...v,driverId:sid};return v;});render();
}

function applyPermit(){
  if(!comply(G).all){addN('warn','全要件を満たしてから申請してください');return;}
  G.phase='applied';G.permitApplied=new Date(G.time);
  const ap=new Date(G.time);ap.setMonth(ap.getMonth()+2);G.permitReady=ap;
  addN('info',`許可申請を提出（中国運輸局 広島運輸支局）。許可予定: ${ap.getFullYear()}/${ap.getMonth()+1}月`);render();
}

function takeLoan(idx){
  const p=LOAN_PRESETS[idx];if(!p)return;
  const mo=loanMonthly(p.amount,p.term);
  askConfirm(`${p.label} (月返済${yen(mo)}・金利2.5%) で融資申請しますか？`,()=>{
    G.loans.push({id:uid(),label:p.label,amount:p.amount,remaining:p.amount,monthly:mo,term:p.term,startDate:new Date(G.time)});
    G.co.cash+=p.amount;G.cfAccum.loanIn+=p.amount;addN('info',`銀行融資 ${yen(p.amount)} 実行（月返済${yen(mo)}）`);});
}

function repayExtra(lid){
  const loan=G.loans.find(l=>l.id===lid);if(!loan)return;
  const el=document.getElementById('repay-'+lid);
  const amt=parseInt(el?.value||'0')*10000;
  if(!amt||amt<=0){addN('warn','返済額を入力してください（万円）');return;}
  if(amt>G.co.cash){addN('warn','現金が不足しています');return;}
  if(amt>loan.remaining){addN('warn','返済額が残高を超えています');return;}
  G.co.cash-=amt;loan.remaining-=amt;G.cfAccum.loanPrincipal+=amt;
  if(loan.remaining<1000){G.loans=G.loans.filter(l=>l.id!==lid);addN('info','ローンを完済しました');}
  else addN('info',`繰上返済 ${yen(amt)} (残高${yen(loan.remaining)})`);render();
}

function resetGame(){askConfirm('ゲームをリセットしますか？（全データが消えます）',()=>{stopTick();G=initState();});}
function addN(type,msg){G.notifs.unshift({id:G.nid++,type,msg,time:new Date(G.time)});if(G.notifs.length>80)G.notifs.pop();}
function toggleNotif(){G.showNotif=!G.showNotif;render();}
function setTab(t){G.tab=t;render();}
function setStaffTab(t){G.staffTab=t;render();}
function setFinTab(t){G.finTab=t;render();}
function askConfirm(msg,action){G._confirm={msg,action};render();}
function confirmYes(){if(G._confirm){const a=G._confirm.action;G._confirm=null;a();}else render();}
function confirmNo(){G._confirm=null;render();}

// ============================================================
// RENDER
// ============================================================
function render(){
  document.getElementById('gtime').textContent=fmt(G.time);
  const cd=document.getElementById('cashdsp');cd.textContent=yen(G.co.cash);cd.className='cash'+(G.co.cash<0?' neg':'');
  const pb=document.getElementById('plbtn');pb.textContent=G.running?'▶ 進行中':'⏸ 停止';pb.className='plbtn '+(G.running?'run':'stp');
  [1,5,10,20,50,100,150].forEach(s=>{const el=document.getElementById('sp'+s);if(el)el.className='spb'+(G.speed===s?' on':'');});
  const nb=document.getElementById('nbadge');nb.textContent=G.notifs.length>9?'9+':G.notifs.length;nb.style.display=G.notifs.length?'flex':'none';
  ['compliance','staff','vehicles','facility','finance','market'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.className='tab'+(G.tab===t?' on':'');});
  document.getElementById('tab-staff').textContent=`スタッフ(${G.staff.length})`;
  document.getElementById('tab-vehicles').textContent=`車両(${G.vehicles.length})`;
  const phases={setup:['開業準備中','pb-setup'],applied:['許可申請中','pb-applied'],operating:['営業中','pb-operating'],gameover:['ゲームオーバー','pb-gameover']};
  const[pl,pc]=phases[G.phase]||['不明','pb-setup'];
  document.getElementById('phasedsp').innerHTML=`<span class="pbadge ${pc}">${pl}</span>`;
  // 季節表示
  const mo=G.time.getMonth();
  const sm=SEASONAL[mo];
  const scarr=sm>=1.1?'🔥':sm>=1.0?'📈':sm>=0.9?'😐':'❄️';
  document.getElementById('seasondsp').innerHTML=`<span class="season-badge">${scarr} ${SEASON_LBL[mo]} ×${sm.toFixed(2)}</span>`;
  const cur=G.fin.cur,net=cur.rev-cur.dPay-cur.fuel;
  document.getElementById('sright').textContent=`粗利${yen(net)} ⛽¥${G.eco.fuel.toFixed(1)} ⚡¥${G.eco.elec.toFixed(1)}`;
  const np=document.getElementById('np');np.style.display=G.showNotif?'flex':'none';
  document.getElementById('nlist').innerHTML=G.notifs.length===0?'<div style="text-align:center;padding:20px;color:var(--sub);font-size:12px">通知なし</div>':G.notifs.map(n=>`<div class="ni"><div class="nd nd-${n.type}"></div><div><div class="nt">${n.msg}</div><div class="ntm">${fmt(n.time)}</div></div></div>`).join('');
  const views={compliance:vCompliance,staff:vStaff,vehicles:vVehicles,facility:vFacility,finance:vFinance,market:vMarket};
  document.getElementById('main').innerHTML=(views[G.tab]||vCompliance)();
  // confirm overlay
  let co=document.getElementById('confirmOverlay');
  if(G._confirm){if(!co){co=document.createElement('div');co.id='confirmOverlay';co.className='overlay';document.getElementById('app').appendChild(co);}co.innerHTML=`<div class="md"><div class="md-title">確認</div><div style="font-size:13px;color:var(--sub);margin-bottom:16px;white-space:pre-line">${G._confirm.msg}</div><div style="display:flex;gap:8px"><button class="btn btn-d" style="flex:1" onclick="confirmYes()">はい</button><button class="btn btn-s" style="flex:1" onclick="confirmNo()">キャンセル</button></div></div>`;}else if(co)co.remove();
  // gameover overlay
  let go=document.getElementById('gomModal');
  if(G.phase==='gameover'&&!go){go=document.createElement('div');go.id='gomModal';go.className='overlay';go.innerHTML=`<div class="md"><div class="md-title">破産 💸</div><div style="font-size:13px;color:var(--sub);margin-bottom:16px">資金がマイナス1億円を超えました。<br>累計売上: ${yen(G.fin.hist.reduce((a,b)=>a+b.rev,0)+G.fin.cur.rev)}</div><button class="btn btn-p btn-bl" onclick="resetGame()">もう一度挑戦する</button></div>`;document.getElementById('app').appendChild(go);}
  else if(G.phase!=='gameover'&&go)go.remove();
}

// ============================================================
// VIEWS
// ============================================================
function vCompliance(){
  const c=comply(G);
  const items=[
    {icon:c.officer.ok?'✅':'❌',title:'役員（専従・法令試験合格）',...c.officer},
    {icon:c.drivers.ok?'✅':'❌',title:'運転者（第二種免許・台数以上）',...c.drivers},
    {icon:c.opsManager.ok?'✅':'❌',title:'運行管理者（国家資格）',...c.opsManager},
    {icon:c.maintManager.ok?'✅':'❌',title:`整備管理者（${G.vehicles.length>=5?'必須':'現在不要'}）`,...c.maintManager},
    {icon:c.minVehicles.ok?'✅':'❌',title:'最低車両台数（5台以上）',...c.minVehicles},
    {icon:c.facility.ok?'✅':'❌',title:'施設要件（営業所・車庫・休憩施設）',...c.facility},
    {icon:c.capital.ok?'✅':'❌',title:'自己資金（計画費用の100%以上）',...c.capital},
  ];
  let banner='';
  if(G.phase==='setup')banner=c.all?`<div class="ib ib-ok">✅ 全要件クリア！許可申請できます。</div>`:`<div class="ib ib-warn">⚠️ 未充足 ${items.filter(i=>!i.ok).length}件。全て満たしてから申請してください。</div>`;
  else if(G.phase==='applied')banner=`<div class="ib ib-info">📋 申請中（中国運輸局 広島運輸支局）。▶ で時間を進めてください。</div>`;
  else banner=c.all?`<div class="ib ib-ok">✅ コンプライアンス良好</div>`:`<div class="ib ib-err">🚨 違反あり！抜き打ち監査で罰則が課されます。</div>`;
  const permitBtn=G.phase==='setup'?`<button class="apply-btn" ${c.all?'':'disabled'} onclick="applyPermit()">📋 ${c.all?'許可申請を提出する（中国運輸局 広島運輸支局）':'全要件を満たしてから申請できます'}</button>`:'';
  return`<div class="card">${banner}<div class="ct">法令コンプライアンスチェック</div>${items.map(i=>`<div class="ci"><div class="ci-ic">${i.icon}</div><div class="ci-body"><div class="ci-t">${i.title}</div><div class="ci-d">${i.detail}</div><div class="ci-law">📖 ${i.law}</div></div></div>`).join('')}${permitBtn}</div><div style="text-align:right"><button class="btn btn-s btn-sm" onclick="resetGame()">↺ リセット</button></div>`;
}

function vStaff(){
  const tabs=`<div class="stabs"><button class="stab ${G.staffTab==='hired'?'on':''}" onclick="setStaffTab('hired')">雇用中(${G.staff.length})</button><button class="stab ${G.staffTab==='applicants'?'on':''}" onclick="setStaffTab('applicants')">応募者(${G.candidates.length})</button></div>`;
  const siNote=p=>{const si=Math.round(p.salary*SI_RATE);return`月給${yen(p.salary)}<span style="color:var(--sub)">+社保${yen(si)}</span>=<strong>${yen(p.salary+si)}</strong>`;};
  const mkQ=c=>[c.lic2?'<span class="qb qb-ok">第二種免許</span>':'<span class="qb qb-ng">免許なし</span>',c.lawPassed?'<span class="qb qb-ok">法令試験合格</span>':'',c.canOfficer?'<span class="qb qb-ok">役員就任可</span>':'',c.opsQ?'<span class="qb qb-ok">運行管理者</span>':'',c.maintQ?'<span class="qb qb-ok">整備管理者</span>':''].filter(Boolean).join('');
  if(G.staffTab==='applicants'){
    return tabs+G.candidates.map(c=>`<div class="sc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="sn">${c.name}</div><div class="sm">${c.age}歳 経験${c.exp}年 歩合${Math.round(c.cr*100)}%</div><div class="sm">${siNote(c)}</div><span class="arc-tag">🏷${c.arcLabel}</span></div><button class="btn btn-p btn-sm" onclick="hireStaff('${c.id}')">採用</button></div><div style="margin-top:5px">${mkQ(c)}</div>${statBars(c.stats)}</div>`).join('');
  }
  if(!G.staff.length)return tabs+'<div class="card" style="text-align:center;color:var(--sub);padding:20px">スタッフ未雇用</div>';
  return tabs+G.staff.map(p=>{
    const avail=[{id:'driver',label:'運転手',cls:'rt-dr',can:p.lic2},{id:'officer',label:'役員(専従)',cls:'rt-of',can:p.canOfficer&&p.lawPassed},{id:'opsmanager',label:'運行管理者',cls:'rt-op',can:p.opsQ},{id:'maintmanager',label:'整備管理者',cls:'rt-ma',can:p.maintQ}];
    const roles=avail.filter(r=>r.can).map(r=>{const on=p.roles.includes(r.id);return`<button class="rt ${on?r.cls:'rt-off'}" onclick="toggleRole('${p.id}','${r.id}')">${on?'✓ ':'+'}${r.label}</button>`;}).join('');
    const vsel=p.roles.includes('driver')?`<div style="margin-top:6px"><select onchange="assignVehicle('${p.id}',this.value)"><option value="">車両(未割当)</option>${G.vehicles.filter(v=>!v.driverId||v.driverId===p.id).map(v=>`<option value="${v.id}" ${v.driverId===p.id?'selected':''}>${VM[v.modelId].name}${v.acquired==='lease'?' [L]':''}</option>`).join('')}</select></div>`:'';
    return`<div class="sc"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="sn">${p.name}</div><div class="sm">${p.age}歳 経験${p.exp}年 歩合${Math.round(p.cr*100)}%</div><div class="sm">${siNote(p)}</div><span class="arc-tag">🏷${p.arcLabel}</span></div><button class="btn btn-d btn-sm" onclick="fireStaff('${p.id}')">解雇</button></div><div style="margin-top:5px">${roles}</div>${vsel}${statBars(p.stats)}</div>`;
  }).join('');
}
function statBars(s){return`<div class="sbw">${[['運転',s.driving],['接客',s.service],['地理',s.geo],['体力',s.stamina],['意欲',s.motivation]].map(([l,v])=>`<div class="sr"><span class="sr-l">${l}</span><div class="sr-b"><div class="sr-f" style="width:${v}%"></div></div><span class="sr-v">${v}</span></div>`).join('')}</div>`;}

function vVehicles(){
  const cap=G.fac.garageCapacity;
  const summary=`<div class="card" style="padding:8px 12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>保有: <strong>${G.vehicles.length}台</strong></span><span>車庫容量: ${cap}台</span><span style="color:${G.vehicles.length>=5?'var(--green)':'var(--red)'}">最低5台必要</span></div></div>`;
  const list=G.vehicles.map(v=>{const m=VM[v.modelId],dr=G.staff.find(p=>p.id===v.driverId),cc=v.cond<40?'var(--red)':v.cond<70?'var(--amber)':'var(--green)';const bv=v.acquired==='purchase'?` 帳簿${yen(v.bookValue||0)}`:'';return`<div class="vc"><div style="display:flex;justify-content:space-between"><div style="flex:1"><div style="font-weight:600;font-size:12px">${m.name}${m.ev?'<span class="ev-tag">EV</span>':''}${v.acquired==='lease'?'<span class="lease-tag">L</span>':''}</div><div style="font-size:11px;color:var(--sub)">${Math.round(v.mileage).toLocaleString()}km 状態<span style="color:${cc}">${v.cond.toFixed(0)}%</span> 月額${yen(v.mo)}${bv}</div></div><button class="btn btn-s btn-sm" onclick="sellVehicle('${v.id}')">${v.acquired==='lease'?'解約':'売却'}</button></div><div class="cbar"><div class="cbar-f" style="width:${v.cond}%;background:${cc}"></div></div><div style="font-size:11px;color:var(--sub);margin-top:4px">担当: ${dr?dr.name:'<span style="color:var(--red)">未割当</span>'}</div></div>`;}).join('');
  const buy=`<div class="card"><div class="ct">車両の取得</div>${cap===0?'<div class="ib ib-warn">先に車庫を確保してください（施設タブ）</div>':''}${Object.entries(VM).map(([id,m])=>`<div style="border:1px solid var(--border);border-radius:9px;padding:9px;margin-bottom:7px"><div style="font-weight:600;font-size:12px;margin-bottom:3px">${m.name}${m.ev?'<span class="ev-tag">EV ⚡</span>':''}</div><div style="font-size:11px;color:var(--sub);margin-bottom:7px">${m.ev?`電費:${m.kwhPkm}kWh/km`:`燃費:${m.fuel}km/L`} 売上×${m.rm}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><div style="border:1px solid var(--border);border-radius:7px;padding:7px;text-align:center"><div style="font-size:10px;color:var(--sub)">購入（耐用4年）</div><div style="font-weight:700;font-size:13px;margin:2px 0">${yen(m.price)}</div><div style="font-size:10px;color:var(--sub)">月額${yen(m.buyMo)} 月償却${yen(Math.round(m.price/48))}</div><button class="btn btn-p btn-sm" style="margin-top:5px;width:100%" onclick="acquireVehicle('${id}','purchase')" ${G.co.cash<m.price||cap===0||G.vehicles.length>=cap?'disabled':''}>購入</button></div><div style="border:1px solid #f5c6cb;border-radius:7px;padding:7px;text-align:center;background:#fff8f9"><div style="font-size:10px;color:#c2185b">リース</div><div style="font-weight:700;font-size:13px;margin:2px 0;color:#c2185b">¥0</div><div style="font-size:10px;color:var(--sub)">月額${yen(m.leaseMo)}</div><button class="btn btn-sm" style="margin-top:5px;width:100%;background:#fce4ec;color:#c2185b;font-weight:600" onclick="acquireVehicle('${id}','lease')" ${cap===0||G.vehicles.length>=cap?'disabled':''}>リース</button></div></div></div>`).join('')}</div>`;
  return summary+(G.vehicles.length?list:'<div class="card" style="text-align:center;color:var(--sub);padding:20px">車両なし</div>')+buy;
}

function vFacility(){
  const built=G.fac.built;
  const eff=[];
  if(built.wash)eff.push('洗車設備: 売上+5%');
  if(built.dispatch)eff.push('配車センター: 売上+8%');
  if(built.ev_chr)eff.push('EV充電: 電費-10%');
  if(built.maintshop)eff.push('整備工場: メンテ費-20%');
  if(built.training)eff.push('研修センター: 運転手能力+5%');
  const effStr=eff.length?`<div class="ib ib-ok" style="margin-top:6px">✓ 有効な設備効果：${eff.join('　')}</div>`:'';
  const summary=`<div class="card"><div class="ct">施設状況</div>
    <div style="font-size:12px;display:grid;gap:3px">
      <div>営業所: ${Object.keys(built).some(k=>k.startsWith('office'))?'<span style="color:var(--green)">✓ 確保済</span>':'<span style="color:var(--red)">✗ 未確保</span>'}</div>
      <div>車庫容量: <strong>${G.fac.garageCapacity}台</strong>${G.fac.extraGarages?` (追加増設×${G.fac.extraGarages})`:''}</div>
      <div>休憩施設: ${built.rest?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--red)">✗</span>'}</div>
      <div style="border-top:1px solid var(--border);margin-top:5px;padding-top:5px">月額合計: <strong>${yen(G.fac.mo)}</strong></div>
    </div>${effStr}</div>`;
  const groups=FAC_GROUPS.map(g=>{
    const items=g.items.map(fid=>{
      const f=FAC_CATALOG[fid];const done=!!built[fid];const locked=f.req&&!built[f.req];
      return`<div class="fac-item ${done?'done':locked?'locked':''}">
        <div style="font-weight:600;font-size:12px">${done?'✅ ':locked?'🔒 ':''}${f.name}</div>
        <div style="font-size:10px;color:var(--sub);margin:2px 0">${f.desc}</div>
        <div style="font-size:11px">${f.cap>0?`+${f.cap}台 ・ `:''}初期${yen(f.price)} 月額${f.mo?yen(f.mo):'なし'}</div>
        ${locked?`<div style="font-size:10px;color:var(--amber);margin-top:3px">先に「${FAC_CATALOG[f.req].name}」が必要</div>`:done?'':`<button class="btn btn-p btn-sm" style="margin-top:5px;width:100%" onclick="buyFac('${fid}')" ${G.co.cash<f.price?'disabled':''}>取得${G.co.cash<f.price?' (資金不足)':''}</button>`}
      </div>`;}).join('');
    return`<div class="card"><div class="ct">${g.label}</div><div class="fac-grid">${items}</div></div>`;
  }).join('');
  // 青天井 追加車庫ボタン (garage6建設済みの場合)
  let expandBtn='';
  if(built.garage6){
    const n=G.fac.extraGarages||0;
    const cost=Math.round(30000000*Math.pow(1.3,n));
    const addMo=Math.round(800000*Math.pow(1.2,n));
    expandBtn=`<div class="card" style="border:2px dashed var(--accent)"><div class="ct">🔓 追加車庫増設（青天井拡張）</div>
      <div style="font-size:12px;color:var(--sub);margin-bottom:8px">車庫6完成後は何度でも増設可能。コストは増設ごとに30%上昇。</div>
      <div style="font-size:12px">第${n+2}車庫 +50台 ／ 初期費用 <strong>${yen(cost)}</strong> ・ 月額 ${yen(addMo)}</div>
      <button class="btn btn-p btn-sm btn-bl" onclick="expandGarage()" ${G.co.cash<cost?'disabled':''}>追加増設する</button>
      <div style="font-size:11px;color:var(--sub);margin-top:5px">現在の収容台数: ${G.fac.garageCapacity}台（増設${n}回）</div>
    </div>`;
  }
  return summary+groups+expandBtn;
}

function vFinance(){
  const tabs=`<div class="stabs"><button class="stab ${G.finTab==='pl'?'on':''}" onclick="setFinTab('pl')">P/L</button><button class="stab ${G.finTab==='bs'?'on':''}" onclick="setFinTab('bs')">B/S</button><button class="stab ${G.finTab==='cf'?'on':''}" onclick="setFinTab('cf')">C/F</button><button class="stab ${G.finTab==='loan'?'on':''}" onclick="setFinTab('loan')">借入</button><button class="stab ${G.finTab==='tax'?'on':''}" onclick="setFinTab('tax')">税金・社保</button></div>`;
  const h=G.fin.hist,m=G.fin.cur;
  const totRev=h.reduce((a,b)=>a+b.rev,0)+m.rev,totPro=h.reduce((a,b)=>a+(b.profit||0),0);
  const totalDebt=G.loans.reduce((a,l)=>a+l.remaining,0);
  const ov=`<div class="sg"><div class="sb"><div class="sl">現金</div><div class="sv ${G.co.cash<0?'neg':''}">${yen(G.co.cash)}</div></div><div class="sb"><div class="sl">借入残高</div><div class="sv ${totalDebt>0?'neg':''}">${yen(totalDebt)}</div></div><div class="sb"><div class="sl">累計利益</div><div class="sv ${totPro>=0?'pos':'neg'}">${yen(totPro)}</div></div><div class="sb"><div class="sl">累計売上</div><div class="sv">${yen(totRev)}</div></div></div>`;

  if(G.finTab==='pl'){
    const net=m.rev-m.dPay-m.fuel;
    const cur=`<div class="card"><div class="ct">今月の暫定P/L (${m.month})</div><div class="fr"><span>売上</span><span>${yen(m.rev)}</span></div><div class="fr fi"><span>- 運転手歩合</span><span>${yen(m.dPay)}</span></div><div class="fr fi"><span>- 燃料・電気費</span><span>${yen(m.fuel)}</span></div><div class="fd"></div><div class="fr"><strong>粗利（暫定）</strong><strong style="color:${net>=0?'var(--green)':'var(--red)'}">${yen(net)}</strong></div></div>`;
    const hist=h.length===0?'<div class="card" style="text-align:center;color:var(--sub);padding:14px;font-size:12px">まだ月次決算なし</div>':[...h].reverse().map(b=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><strong style="font-size:12px">${b.month}</strong><strong style="color:${b.profit>=0?'var(--green)':'var(--red)'}">${yen(b.profit)} (${b.rev>0?(b.profit/b.rev*100).toFixed(1):'0'}%)</strong></div><div class="fr"><span>売上</span><span>${yen(b.rev)}</span></div><div class="fr fi"><span>- 歩合</span><span>${yen(b.dPay)}</span></div><div class="fr fi"><span>- 燃料・電気</span><span>${yen(b.fuel)}</span></div><div class="fr fi"><span>- 車両月額</span><span>${yen(b.vmo)}</span></div><div class="fr fi"><span>- 施設費</span><span>${yen(b.fmo)}</span></div><div class="fr fi"><span>- 給与</span><span>${yen(b.sal)}</span></div><div class="fr fi"><span>- 社会保険(事業主)</span><span>${yen(b.socialIns)}</span></div><div class="fr fi"><span>- メンテ費</span><span>${yen(b.maint)}</span></div><div class="fr fi"><span>- 減価償却</span><span>${yen(b.depreciation)}</span></div><div class="fr fi"><span>- 支払利息</span><span>${yen(b.loanInterest)}</span></div><div class="fd"></div><div class="fr"><strong>当期利益</strong><strong style="color:${b.profit>=0?'var(--green)':'var(--red)'}">${yen(b.profit)}</strong></div></div>`).join('');
    return tabs+ov+cur+hist;
  }

  if(G.finTab==='bs'){
    const vehicleBV=G.vehicles.filter(v=>v.acquired==='purchase').reduce((s,v)=>s+(v.bookValue||0),0);
    const totalA=G.co.cash+vehicleBV;
    const ctLiab=G.taxes.ctAccrued;
    const corpEst=Math.max(70000,G.taxes.corpFYProfit>0?calcCorpTax(G.taxes.corpFYProfit):70000);
    const totalL=totalDebt+ctLiab+corpEst;
    const equity=totalA-totalL;const retained=equity-G.capitalStock;
    return tabs+`<div class="card"><div class="ct">貸借対照表 B/S（${fmt(G.time).slice(0,7)}）</div>
      <div class="bs-hdr">資産の部</div>
      <div class="bs-row bs-ind"><span>現金・預金</span><span>${yen(G.co.cash)}</span></div>
      <div class="bs-row bs-ind"><span>車両（帳簿価額）</span><span>${yen(vehicleBV)}</span></div>
      <div class="bs-total"><span>資産合計</span><span>${yen(totalA)}</span></div>
      <div class="bs-hdr">負債の部</div>
      <div class="bs-row bs-ind"><span>借入金</span><span>${yen(totalDebt)}</span></div>
      <div class="bs-row bs-ind"><span>未払消費税（概算）</span><span>${yen(ctLiab)}</span></div>
      <div class="bs-row bs-ind"><span>未払法人税等（概算）</span><span>${yen(corpEst)}</span></div>
      <div class="bs-total"><span>負債合計</span><span>${yen(totalL)}</span></div>
      <div class="bs-hdr">純資産の部</div>
      <div class="bs-row bs-ind"><span>資本金</span><span>${yen(G.capitalStock)}</span></div>
      <div class="bs-row bs-ind"><span style="color:${retained>=0?'var(--green)':'var(--red)'}">繰越利益剰余金</span><span style="color:${retained>=0?'var(--green)':'var(--red)'}">${yen(retained)}</span></div>
      <div class="bs-total"><span>純資産合計</span><span style="color:${equity>=0?'var(--green)':'var(--red)'}">${yen(equity)}</span></div>
      <div class="bs-total" style="border-top:2px solid var(--text)"><span>負債・純資産合計</span><span>${yen(totalL+equity)}</span></div>
      <div class="ib ib-info" style="margin-top:8px;font-size:11px">※施設は費用処理済として資産計上外。リース車両はオフバランス。</div></div>`;
  }

  if(G.finTab==='cf'){
    const ca=G.cfAccum;
    const totDep=G.fin.hist.reduce((a,b)=>a+(b.depreciation||0),0);
    const opNet=ca.opIn-ca.opOut+totDep;
    const invNet=-(ca.vPurchase+ca.facPurchase)+ca.vSale;
    const finNet=ca.loanIn-ca.loanPrincipal;
    return tabs+`<div class="card"><div class="ct">キャッシュフロー計算書 C/F（累計）</div>
      <div style="background:#f0f6ff;border-radius:6px;padding:7px;margin-bottom:6px">
        <div class="cf-row"><strong>Ⅰ 営業活動によるCF</strong></div>
        <div class="cf-row cf-ind"><span>営業収入</span><span>${yen(ca.opIn)}</span></div>
        <div class="cf-row cf-ind"><span>営業支出（人件費・燃料・税等）</span><span style="color:var(--red)">-${yen(ca.opOut)}</span></div>
        <div class="cf-row cf-ind"><span>減価償却費（非現金加算）</span><span>${yen(totDep)}</span></div>
        <div class="cf-sub"><span>営業CF計</span><span style="color:${opNet>=0?'var(--green)':'var(--red)'}">${yen(opNet)}</span></div>
      </div>
      <div style="background:#f0fff4;border-radius:6px;padding:7px;margin-bottom:6px">
        <div class="cf-row"><strong>Ⅱ 投資活動によるCF</strong></div>
        <div class="cf-row cf-ind"><span>車両取得</span><span style="color:var(--red)">-${yen(ca.vPurchase)}</span></div>
        <div class="cf-row cf-ind"><span>車両売却収入</span><span>${yen(ca.vSale)}</span></div>
        <div class="cf-row cf-ind"><span>施設取得</span><span style="color:var(--red)">-${yen(ca.facPurchase)}</span></div>
        <div class="cf-sub"><span>投資CF計</span><span style="color:${invNet>=0?'var(--green)':'var(--red)'}">${yen(invNet)}</span></div>
      </div>
      <div style="background:#fff8f0;border-radius:6px;padding:7px;margin-bottom:6px">
        <div class="cf-row"><strong>Ⅲ 財務活動によるCF</strong></div>
        <div class="cf-row cf-ind"><span>銀行借入</span><span>${yen(ca.loanIn)}</span></div>
        <div class="cf-row cf-ind"><span>借入元金返済</span><span style="color:var(--red)">-${yen(ca.loanPrincipal)}</span></div>
        <div class="cf-sub"><span>財務CF計</span><span style="color:${finNet>=0?'var(--green)':'var(--red)'}">${yen(finNet)}</span></div>
      </div>
      <div style="border-top:2px solid var(--border);padding-top:5px;display:flex;justify-content:space-between;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums">
        <span>フリーCF（Ⅰ+Ⅱ）</span><span style="color:${(opNet+invNet)>=0?'var(--green)':'var(--red)'}">${yen(opNet+invNet)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;margin-top:4px">
        <span>期間純増減（Ⅰ+Ⅱ+Ⅲ）</span><span style="color:${(opNet+invNet+finNet)>=0?'var(--green)':'var(--red)'}">${yen(opNet+invNet+finNet)}</span>
      </div></div>`;
  }

  if(G.finTab==='loan'){
    const loanList=G.loans.length===0?'<div style="text-align:center;padding:10px;color:var(--sub);font-size:12px">借入なし</div>':G.loans.map(l=>`<div class="loan-row"><div style="font-weight:600">${l.label}</div><div class="loan-meta"><span>残高 ${yen(l.remaining)}</span><span>月返済 ${yen(l.monthly)}</span><span>残約${Math.max(0,Math.ceil(l.remaining/l.monthly))}ヶ月</span></div><div style="display:flex;gap:5px;margin-top:6px;align-items:center"><input type="number" id="repay-${l.id}" placeholder="繰上返済額(万円)" style="padding:4px 6px;font-size:11px"><button class="btn btn-s btn-sm" onclick="repayExtra('${l.id}')">繰上返済</button></div></div>`).join('');
    const opts=LOAN_PRESETS.map((p,i)=>`<option value="${i}">${p.label} → 月${yen(loanMonthly(p.amount,p.term))}</option>`).join('');
    return tabs+ov+`<div class="card"><div class="ct">借入管理 <span style="font-size:10px;color:var(--sub)">金利 年2.5%・元利均等</span></div>${loanList}<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px"><div style="font-size:12px;color:var(--sub);margin-bottom:5px">新規融資申請</div><select id="loanPresetSel" style="margin-bottom:5px">${opts}</select><button class="btn btn-p btn-sm btn-bl" onclick="takeLoan(parseInt(document.getElementById('loanPresetSel').value))">融資申請</button></div></div>`;
  }

  if(G.finTab==='tax'){
    const salTotal=G.staff.reduce((a,p)=>a+p.salary,0);
    const siTotal=Math.round(salTotal*SI_RATE);
    const estCorp=calcCorpTax(G.taxes.corpFYProfit);
    const nm=G.time.getMonth();const qM=[2,5,8,11];const nq=qM.find(q=>q>nm)??2;const nqYr=nq<nm?G.time.getFullYear()+1:G.time.getFullYear();
    const taxHist=G.taxes.history.length===0?'<div style="font-size:11px;color:var(--sub)">納税履歴なし</div>':G.taxes.history.slice().reverse().slice(0,8).map(t=>`<div class="fr"><span class="fi">${fmt(t.date).slice(0,7)} ${t.type}</span><span style="color:var(--red)">-${yen(t.amount)}</span></div>`).join('');
    return tabs+`<div class="card"><div class="ct">社会保険料（事業主負担 月額）</div>
      <div class="ib ib-info" style="margin-bottom:6px">協会けんぽ広島 2024年度 事業主負担率合計: 約16.835%</div>
      <div class="fr"><span>給与総額</span><span>${yen(salTotal)}</span></div>
      ${SI_DETAIL.map(d=>`<div class="fr fi"><span>- ${d.label} (${d.rate}%)</span><span>${yen(Math.round(salTotal*d.rate/100))}</span></div>`).join('')}
      <div class="fd"></div><div class="fr"><strong>月額合計（事業主負担）</strong><strong style="color:var(--red)">${yen(siTotal)}</strong></div></div>
    <div class="card"><div class="ct">消費税（四半期納付）</div>
      <div class="fr"><span>今期累積（未払）</span><span>${yen(G.taxes.ctAccrued)}</span></div>
      <div class="fr"><span>次回納付予定</span><span>${nqYr}/${String(nq+1).padStart(2,'0')}末</span></div>
      <div class="fr"><span>累計納付済</span><span>${yen(G.taxes.ctPaid)}</span></div>
      <div class="ib ib-info" style="margin-top:5px">課税売上の消費税10% - 仕入税額控除後の実効率 約3.6%で計算</div></div>
    <div class="card"><div class="ct">法人税等（3月決算）</div>
      <div class="ib ib-info" style="margin-bottom:6px">法人税(15〜23.2%) + 法人住民税 + 法人事業税 ≒ 実効35%。均等割¥7万/年（赤字でも課税）</div>
      <div class="fr"><span>当期累積利益（FY）</span><span style="color:${G.taxes.corpFYProfit>=0?'var(--green)':'var(--red)'}">${yen(G.taxes.corpFYProfit)}</span></div>
      <div class="fr"><span>推定税額</span><span style="color:var(--red)">${yen(estCorp)}</span></div>
      <div class="fr"><span>累計納付済</span><span>${yen(G.taxes.corpPaid)}</span></div></div>
    <div class="card"><div class="ct">納税履歴</div>${taxHist}</div>`;
  }
  return tabs+ov;
}

function vMarket(){
  const myVc=G.vehicles.filter(v=>v.driverId).length;
  const mo=G.time.getMonth();
  const sm=SEASONAL[mo];
  const allComp=G.competitors;
  const compTot=parseFloat(allComp.reduce((a,c)=>a+c.share,0).toFixed(1));
  const totalVc=myVc+allComp.reduce((a,c)=>a+c.vehicles,0);
  const myShare=totalVc>0?parseFloat((myVc/totalVc*100).toFixed(1)):0;
  const others=parseFloat(Math.max(0,100-myShare-compTot).toFixed(1));
  const segs=[{name:G.co.name,share:myShare,color:'#0071e3'},...allComp.map(c=>({name:c.name,share:c.share,color:c.color})),{name:'その他',share:others,color:'#ccc'}];
  const barSegs=segs.map(s=>`<div class="comp-seg" style="width:${s.share}%;background:${s.color}"></div>`).join('');
  const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px"><div style="width:10px;height:10px;background:${s.color};border-radius:2px;flex-shrink:0"></div><span>${s.name}</span><strong>${s.share}%</strong></div>`).join('');

  // 年間需要カレンダー
  const calRows=Array.from({length:12},(_,i)=>{
    const s=SEASONAL[i];const w=Math.round((s-0.8)*250);const isNow=i===mo;
    const bg=s>=1.2?'#ffebee':s>=1.0?'#e8f5e9':s>=0.9?'#fff8e1':'#e3f2fd';
    const emoji=s>=1.2?'🔥':s>=1.0?'📈':s>=0.9?'😐':'❄️';
    return`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;${isNow?'font-weight:700':''}">
      <span style="width:20px;font-size:11px;text-align:right">${i+1}月</span>
      <div style="flex:1;height:14px;background:#f0f0f3;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${clamp(w,2,100)}%;background:${s>=1.1?'#e53935':s>=1.0?'#43a047':s>=0.9?'#fb8c00':'#1e88e5'};border-radius:3px"></div>
      </div>
      <span style="font-size:10px;width:26px;text-align:right;font-variant-numeric:tabular-nums">${s.toFixed(2)}</span>
      <span style="font-size:10px">${emoji}</span>
      <span style="font-size:10px;color:var(--sub);flex:1">${isNow?'◀ 現在':''}</span>
    </div>`;}).join('');

  const compCards=allComp.map(c=>{
    const trendStr=c.trend>0.05?`<span style="color:var(--red)">▲${c.trend.toFixed(1)}%</span>`:c.trend<-0.05?`<span style="color:var(--green)">▼${Math.abs(c.trend).toFixed(1)}%</span>`:'<span style="color:var(--sub)">−</span>';
    return`<div class="comp-card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:13px"><span style="display:inline-block;width:10px;height:10px;background:${c.color};border-radius:2px;margin-right:5px;vertical-align:middle"></span>${c.name}</div><div style="font-size:11px;color:var(--sub)">車両${c.vehicles}台 ・ シェア${c.share}% ${trendStr} ・ ${c.aggression>.5?'⚠️ 積極型':'😐 安定型'}</div></div></div><div class="cbar" style="margin-top:5px"><div class="cbar-f" style="width:${Math.min(100,c.share*2)}%;background:${c.color}"></div></div></div>`;}).join('');

  return`<div class="card"><div class="ct">広島市内 市場シェア</div>
    <div class="comp-bar-wrap" style="margin-bottom:8px">${barSegs}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">${legend}</div>
    <div style="font-size:11px;color:var(--sub)">市場全体 約${totalVc}台稼働</div>
    <div class="comp-card" style="border-color:var(--accent);margin-top:8px"><div style="font-weight:600;font-size:13px;color:var(--accent)">🚕 ${G.co.name}（自社）</div><div style="font-size:11px;color:var(--sub)">稼働${myVc}台 ／ 保有${G.vehicles.length}台 ・ シェア <strong>${myShare}%</strong></div><div class="cbar" style="margin-top:5px"><div class="cbar-f" style="width:${Math.min(100,myShare*2)}%;background:var(--accent)"></div></div></div>
  </div>
  <div class="card"><div class="ct">競合各社</div>${compCards}</div>
  <div class="card"><div class="ct">年間需要カレンダー（季節変動係数）</div>
    <div class="ib ib-info" style="margin-bottom:6px">現在: <strong>${SEASON_LBL[mo]}（×${sm.toFixed(2)}）</strong><br>12月(忘年会)が最高値×1.35、8月(お盆)が最低値×0.82</div>
    ${calRows}
  </div>`;
}

render();
</script>
</body>
