<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>タクシー帝国</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f7;--surface:#fff;--border:#d2d2d7;--text:#1d1d1f;--sub:#6e6e73;--accent:#0071e3;--green:#34c759;--red:#ff3b30;--amber:#ff9500;--fn:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif}
body{font-family:var(--fn);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 12px;flex-shrink:0}
.tr1{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.game-title{font-weight:700;font-size:14px}
.game-time{font-size:11px;color:var(--sub);font-variant-numeric:tabular-nums}
.cash{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}.cash.neg{color:var(--red)}
.tr2{display:flex;align-items:center;justify-content:space-between;gap:4px}
.spg{display:flex;gap:1px;background:#f0f0f3;border-radius:8px;padding:2px}
.spb{background:none;border:none;padding:2px 5px;border-radius:5px;font-size:10px;cursor:pointer;color:var(--sub)}
.spb.on{background:var(--surface);color:var(--text);font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.plbtn{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer}
.plbtn.run{background:#d4f5df;color:#155724}.plbtn.stp{background:#f0f0f3;color:var(--text)}
.nbtn{position:relative;background:none;border:none;font-size:15px;cursor:pointer;padding:0 3px}
.nbadge{position:absolute;top:-3px;right:-3px;background:var(--red);color:#fff;font-size:9px;border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center}
#tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;overflow-x:auto}
.tab{flex:1;min-width:42px;padding:8px 2px;text-align:center;font-size:10px;font-weight:500;color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;border-top:none;border-left:none;border-right:none;background:none}
.tab.on{color:var(--accent);border-bottom-color:var(--accent);background:#f0f6ff}
#main{flex:1;overflow-y:auto;padding:10px}
#sbar{background:var(--surface);border-top:1px solid var(--border);padding:4px 12px;display:flex;justify-content:space-between;font-size:10px;color:var(--sub);flex-shrink:0;gap:4px;flex-wrap:wrap}
#sbar span{font-variant-numeric:tabular-nums;white-space:nowrap}
.pbadge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.pb-setup{background:#fff3cd;color:#856404}.pb-applied{background:#cce5ff;color:#004085}.pb-operating{background:#d4edda;color:#155724}.pb-gameover{background:#f8d7da;color:#721c24}.pb-clear{background:#ede9fe;color:#5b21b6}
.season-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px;margin-bottom:9px}
.ct{font-weight:600;font-size:13px;margin-bottom:8px}
.ci{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid #f0f0f3;font-size:12px}
.ci:last-child{border-bottom:none}
.ci-ic{flex-shrink:0;font-size:14px}.ci-body{flex:1}
.ci-t{font-weight:500;margin-bottom:1px}.ci-d{font-size:11px;color:var(--sub)}.ci-law{font-size:10px;color:#ccc;margin-top:2px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.sb{background:var(--bg);border-radius:8px;padding:7px 9px}
.sl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.sv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:1px}
.sv.pos{color:var(--green)}.sv.neg{color:var(--red)}
.btn{display:inline-block;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--accent);color:#fff}.btn-d{background:var(--red);color:#fff}.btn-s{background:#f0f0f3;color:var(--text)}.btn-g{background:var(--green);color:#fff}
.btn-sm{padding:4px 9px;font-size:11px}.btn-bl{width:100%;display:block;text-align:center;margin-top:6px}
.stabs{display:flex;gap:2px;background:#f0f0f3;border-radius:8px;padding:2px;margin-bottom:10px}
.stab{flex:1;padding:4px;font-size:11px;border:none;background:none;color:var(--sub);border-radius:6px;cursor:pointer;text-align:center}
.stab.on{background:var(--surface);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.sc{border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px}
.sn{font-weight:600;font-size:13px}.sm{font-size:11px;color:var(--sub);margin-top:1px}
.arc-tag{display:inline-block;background:#f0f0f3;color:var(--sub);font-size:10px;padding:1px 6px;border-radius:4px;margin-top:3px}
.rt{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;margin-right:3px;margin-top:4px;cursor:pointer;border:none}
.rt-off{background:#f0f0f3;color:var(--sub)}.rt-dr{background:#e8f4fd;color:#0071e3}.rt-of{background:#fdf3e8;color:#d35400}.rt-op{background:#e8fdf3;color:#27ae60}.rt-ma{background:#fde8fd;color:#8e44ad}
.qb{display:inline-block;padding:2px 5px;border-radius:3px;font-size:10px;margin-right:3px;margin-top:3px}
.qb-ok{background:#d4edda;color:#155724}.qb-ng{background:#f0f0f3;color:var(--sub)}
.sbw{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px}
.sr{display:flex;align-items:center;gap:4px;font-size:10px}
.sr-l{width:22px;color:var(--sub)}.sr-b{flex:1;height:3px;background:#f0f0f3;border-radius:2px;overflow:hidden}
.sr-f{height:100%;background:var(--accent)}.sr-v{width:20px;text-align:right;color:var(--sub);font-variant-numeric:tabular-nums}
.vc{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px}
.cbar{height:4px;background:#f0f0f3;border-radius:2px;overflow:hidden;margin-top:4px}.cbar-f{height:100%;border-radius:2px}
.ev-tag{display:inline-block;background:#ede9fe;color:#7c3aed;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px}
.lease-tag{display:inline-block;background:#fff0f6;color:#c2185b;font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px}
.depot-chip{display:inline-block;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--sub);margin-right:4px;margin-bottom:5px}
.depot-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.av-node{border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.av-node.done{border-color:var(--green);background:#f0fff4}
.av-node.active{border-color:var(--amber);background:#fffbf0}
.av-node.locked{opacity:.6;background:#fafafa}
.fr{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;font-variant-numeric:tabular-nums}
.fd{border-top:1px solid var(--border);margin:4px 0}.fi{padding-left:12px;color:var(--sub)}
.ib{border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;line-height:1.5}
.ib-ok{background:#d4edda;border:1px solid #c3e6cb;color:#155724}
.ib-warn{background:#fff3cd;border:1px solid #ffc107;color:#856404}
.ib-info{background:#cce5ff;border:1px solid #b8daff;color:#004085}
.ib-err{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24}
.ib-purple{background:#ede9fe;border:1px solid #c4b5fd;color:#5b21b6}
.apply-btn{width:100%;padding:12px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:8px}
.apply-btn:disabled{background:#f0f0f3;color:var(--sub);cursor:not-allowed}
.apply-btn:not(:disabled){background:var(--accent);color:#fff}
.fac-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.fac-item{border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px}
.fac-item.done{border-color:var(--green);background:#f0fff4}
.fac-item.locked{opacity:.6;background:#fafafa}
.comp-card{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px}
.comp-seg{height:100%}
.loan-row{border:1px solid var(--border);border-radius:8px;padding:9px;margin-bottom:7px;font-size:12px}
.loan-meta{color:var(--sub);display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.bs-hdr{background:#f5f5f7;margin:8px -11px 4px;padding:3px 11px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px}
.bs-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;font-variant-numeric:tabular-nums}
.bs-ind{padding-left:14px;color:var(--sub)}
.bs-total{display:flex;justify-content:space-between;border-top:2px solid var(--border);padding:5px 0;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.cf-row{display:flex;justify-content:space-between;padding:2px 4px;font-size:12px;font-variant-numeric:tabular-nums}
.cf-ind{padding-left:14px;color:var(--sub)}
.cf-sub{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding:4px;font-size:12px;font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.pay-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;margin-right:3px}
.pay-cash{background:#e8f5e9;color:#2e7d32}.pay-credit{background:#e3f2fd;color:#1565c0}.pay-app{background:#fce4ec;color:#ad1457}
#np{position:absolute;inset:0;background:var(--surface);z-index:100;display:none;flex-direction:column}
#np.show{display:flex}
.nh{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px}
.nl{flex:1;overflow-y:auto;padding:8px 12px}
.ni{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f7}
.nd{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.nd-info{background:var(--accent)}.nd-warn{background:var(--amber)}.nd-danger{background:var(--red)}
.nt{font-size:12px}.ntm{font-size:10px;color:var(--sub);margin-top:1px;font-variant-numeric:tabular-nums}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.md{background:var(--surface);border-radius:14px;padding:20px;width:100%;max-width:380px}
.md-title{font-size:15px;font-weight:700;margin-bottom:10px}
select,input[type=number],input[type=text]{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;background:var(--surface);color:var(--text);font-family:var(--fn);width:100%}
</style>
</head>
<body>
<div id="app" style="height:100%;display:flex;flex-direction:column;position:relative">
  <div id="topbar">
    <div class="tr1">
      <span class="game-title">🚕 タクシー帝国</span>
      <span id="gtime" class="game-time"></span>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="btn btn-s btn-sm" onclick="saveGame()" title="セーブ">💾</button>
        <button class="btn btn-s btn-sm" onclick="loadGame()" title="ロード">📂</button>
        <button class="nbtn" onclick="toggleNotif()">🔔<span id="nbadge" class="nbadge" style="display:none"></span></button>
      </div>
    </div>
    <div class="tr2">
      <div class="spg">
        <button class="plbtn stp" id="plbtn" onclick="togglePlay()">⏸</button>
        <button class="spb" id="sp1"   onclick="setSpeed(1)">1x</button>
        <button class="spb" id="sp5"   onclick="setSpeed(5)">5x</button>
        <button class="spb" id="sp10"  onclick="setSpeed(10)">10x</button>
        <button class="spb" id="sp20"  onclick="setSpeed(20)">20x</button>
        <button class="spb" id="sp50"  onclick="setSpeed(50)">50x</button>
        <button class="spb" id="sp100" onclick="setSpeed(100)">100x</button>
        <button class="spb" id="sp150" onclick="setSpeed(150)">150x</button>
      </div>
      <span id="cashdsp" class="cash"></span>
    </div>
  </div>
  <div id="tabs">
    <button class="tab" id="tab-compliance" onclick="setTab('compliance')">法令</button>
    <button class="tab" id="tab-staff"      onclick="setTab('staff')">スタッフ</button>
    <button class="tab" id="tab-vehicles"   onclick="setTab('vehicles')">車両</button>
    <button class="tab" id="tab-facility"   onclick="setTab('facility')">施設</button>
    <button class="tab" id="tab-tech"       onclick="setTab('tech')">技術</button>
    <button class="tab" id="tab-finance"    onclick="setTab('finance')">財務</button>
    <button class="tab" id="tab-market"     onclick="setTab('market')">市場</button>
  </div>
  <div id="main"></div>
  <div id="sbar">
    <div id="phasedsp"></div>
    <span id="seasondsp"></span>
    <span id="sright"></span>
  </div>
  <div id="np">
    <div class="nh"><span>通知</span><button class="btn btn-s btn-sm" onclick="toggleNotif()">閉じる</button></div>
    <div class="nl" id="nlist"></div>
  </div>
</div>

// CONSTANTS

function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36).slice(-5);}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function yen(n){const v=Math.round(n);if(Math.abs(v)>=100000000)return`¥${(v/100000000).toFixed(2)}億`;if(Math.abs(v)>=10000)return`¥${(v/10000).toFixed(1)}万`;return`¥${v.toLocaleString()}`;}
function fmt(d){return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function skillMult(p,train){return(0.5+(p.stats.driving+p.stats.service+p.stats.geo)/300)*(p.stats.motivation/100)*(train?1.05:1.0);}
function loanMonthly(a,t){const r=0.025/12;return Math.round(a*r/(1-Math.pow(1+r,-t)));}
function calcCorpTax(p){if(p<=0)return 70000;const t=p<=8000000?p*.15:8000000*.15+(p-8000000)*.232;return Math.max(70000,Math.round(t*1.42));}
function avCur(){return AV_LEVELS.find(a=>a.lv===G.av.level)||{condMult:1,fuelMult:1,driverRatio:1};}
function mkDepot(areaId){
  const a=AREAS.find(x=>x.id===areaId)||AREAS[0];
  return{id:uid(),areaId,name:a.name.split('（')[0]+'営業所',mult:a.mult,built:{},garageCapacity:0,mo:0,hasRest:false,extraGarages:0};
}
// JSONからゲーム状態を復元（Dateオブジェクト再生）
function reviveG(raw){
  return JSON.parse(JSON.stringify(raw),(k,v)=>{
    if(typeof v==='string'&&/^\d{4}-\d{2}-\d{2}T/.test(v))return new Date(v);
    return v;
  });
}

function newBucket(d){return{month:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,rev:0,cashRev:0,creditRev:0,appRev:0,arFees:0,dPay:0,fuel:0,vmo:0,fmo:0,sal:0,socialIns:0,maint:0,depreciation:0,loanInterest:0,profit:null};}
function genCandidates(n){
  const list=Array.from({length:n},()=>{
    const arc=ARC[Math.floor(Math.random()*ARC.length)];const fem=Math.random()<.25;
    const bs={d:rnd(35,72),sv:rnd(30,70),g:rnd(30,72),st:rnd(45,80),m:rnd(55,85)};
    const stats={driving:clamp(bs.d+arc.b.d,10,99),service:clamp(bs.sv+arc.b.sv,10,99),geo:clamp(bs.g+arc.b.g,10,99),stamina:clamp(bs.st+arc.b.st,10,99),motivation:clamp(bs.m+arc.b.m,10,99)};
    const lp=arc.ofC>0&&Math.random()<arc.ofC;
    return{id:uid(),name:`${LAST[rnd(0,LAST.length-1)]} ${fem?FIRST_F[rnd(0,FIRST_F.length-1)]:FIRST_M[rnd(0,FIRST_M.length-1)]}`,
      age:rnd(24,65),exp:rnd(0,25),arc:arc.id,arcLabel:arc.label,lic2:arc.id!=='new'||Math.random()<.3,lawPassed:lp,canOfficer:lp,opsQ:Math.random()<arc.oC,maintQ:Math.random()<arc.mC,
      stats,salary:rnd(190000,330000),cr:.44+Math.random()*.13,roles:[],vehicleId:null};
  });
  if(!list.some(c=>c.opsQ)){const t=rnd(0,n-1);list[t]={...list[t],opsQ:true,arcLabel:list[t].arcLabel+' ★運行管理者'};}
  if(!list.some(c=>c.maintQ)){const t=rnd(0,n-1);list[t]={...list[t],maintQ:true,arcLabel:list[t].arcLabel+' ★整備管理者'};}
  if(!list.some(c=>c.canOfficer&&c.lawPassed)){const t=rnd(0,n-1);list[t]={...list[t],canOfficer:true,lawPassed:true,arcLabel:list[t].arcLabel+' ★役員候補'};}
  return list;
}

function comply(s){
  const vc=s.vehicles.length,st=s.staff;
  const hasOfficer=st.some(p=>p.roles.includes('officer')&&p.canOfficer&&p.lawPassed);
  const drivers=st.filter(p=>p.roles.includes('driver'));
  const avD=AV_LEVELS.find(a=>a.lv===(s.av?.level||0))||{driverRatio:1};
  const reqD=Math.ceil(vc*avD.driverRatio);
  const dOk=reqD===0||(drivers.length>=reqD&&drivers.every(p=>p.lic2));
  const hasOps=st.some(p=>p.roles.includes('opsmanager')&&p.opsQ);
  const needMaint=vc>=5,hasMaint=st.some(p=>p.roles.includes('maintmanager')&&p.maintQ);
  const maintOk=!needMaint||hasMaint,minV=vc>=5;
  const md=s.depots?.[0]||{};
  const hasOffice=Object.keys(md.built||{}).some(k=>k.startsWith('office'));
  const facOk=hasOffice&&md.garageCapacity>=Math.min(vc,s.vehicles.filter(v=>v.depotId===md.id).length||vc)&&md.hasRest;
  const mo=s.vehicles.reduce((a,v)=>a+v.mo,0)+s.depots.reduce((a,d)=>a+d.mo,0)+st.reduce((a,p)=>a+p.salary,0);
  const reqCap=Math.max(5000000,mo*3);const capOk=s.co.cash>=reqCap;
  return{
    officer:{ok:hasOfficer,detail:hasOfficer?'役員が専従・法令試験合格済':'法令試験合格済の専従役員が未選任',law:'道路運送法§9'},
    drivers:{ok:dOk,detail:reqD===0?`自動運転Lv.5 運転手不要`:`運転手${drivers.length}名 ／ 必要${reqD}名${avD.driverRatio<1?` (AV Lv.${s.av?.level} 補正)`:''} ／ 車両${vc}台`,law:'道路運送法：第二種運転免許・台数以上'},
    opsManager:{ok:hasOps,detail:hasOps?'運行管理者 選任済':'運行管理者（国家資格）が未選任',law:'道路運送法§23'},
    maintManager:{ok:maintOk,detail:needMaint?(hasMaint?'整備管理者 選任済':'整備管理者が未選任（5台以上のため必須）'):'現在不要',law:'道路運送車両法§50'},
    minVehicles:{ok:minV,detail:`${vc}台確保（最低5台）`,law:'国土交通省令'},
    facility:{ok:facOk,detail:!hasOffice?'本社営業所を確保してください':!md.hasRest?'休憩施設が必要です':md.garageCapacity<5?'車庫（最低10台）を確保してください':'施設 確保済',law:'道路運送法：車庫2km以内・3年使用権原'},
    capital:{ok:capOk,detail:`保有${yen(s.co.cash)} ／ 必要${yen(reqCap)}`,law:'国土交通省：申請から許可まで100%確保'},
    all:hasOfficer&&dOk&&hasOps&&maintOk&&minV&&facOk&&capOk,
  };
}

// ============================================================
// GAME LOOP
// ============================================================
let G=initState(),timer=null;
function togglePlay(){if(G.phase==='gameover'||G.phase==='clear')return;G.running=!G.running;G.running?startTick():stopTick();render();}
function setSpeed(s){G.speed=s;if(G.running){stopTick();startTick();}render();}
function startTick(){if(timer)clearInterval(timer);let last=Date.now();timer=setInterval(()=>{const n=Date.now();tick(n-last);last=n;},500);}
function stopTick(){if(timer){clearInterval(timer);timer=null;}}
function tick(ms){
  if(!G.running||G.phase==='gameover'||G.phase==='clear')return;
  let rem=Math.floor((ms/1000)*6*G.speed),s=0;
  while(rem>0&&s++<50000){
    const step=Math.min(rem,60-G.time.getMinutes());
    G.time=new Date(G.time.getTime()+step*60000);rem-=step;
    if(G.time.getMinutes()===0)onHour();
    if(G.time.getDate()===1&&G.time.getHours()===0&&G.time.getMinutes()===0)onMonthEnd();
  }
  render();
}

function onHour(){
  // AV研究完了チェック
  if(G.av.researching&&G.time>=new Date(G.av.researching.completeDate))completeResearch();
  if(G.phase==='applied'&&G.permitReady&&G.time>=G.permitReady){G.phase='operating';addN('info','許可が交付されました！🎉');}
  if(G.phase!=='operating')return;
  const h=G.time.getHours(),dem=DEM[h];
  const wm=(d=>d===5||d===6?1.15:d===0?.9:1.0)(G.time.getDay());
  const sm=SEASONAL[G.time.getMonth()];
  const av=avCur();
  let rev=0,dPay=0,fuel=0;
  G.vehicles=G.vehicles.map(v=>{
    const dr=G.staff.find(p=>p.id===v.driverId);if(!dr)return v;
    const depot=G.depots.find(d=>d.id===v.depotId)||G.depots[0];
    const wb=depot.built?.wash?1.05:1.0,db=depot.built?.dispatch?1.08:1.0;
    const evB=depot.built?.ev_chr?.90:1.0,train=!!depot.built?.training;
    const m=VM[v.modelId],sk=skillMult(dr,train),cm=0.6+(v.cond/100)*.4;
    const hr=BASE_REV*dem*wm*sm*m.rm*sk*cm*wb*db*depot.mult;
    rev+=hr;dPay+=hr*dr.cr;
    const km=8+dem*10;
    fuel+=m.ev?km*m.kwhPkm*G.eco.elec*evB*av.fuelMult:(km/m.fuel)*G.eco.fuel*av.fuelMult;
    return{...v,mileage:v.mileage+km,cond:Math.max(0,v.cond-km*.002*av.condMult),totalRev:(v.totalRev||0)+hr};
  });
  const cashRev=rev*PAY_MIX.cash,crRev=rev*PAY_MIX.credit,apRev=rev*PAY_MIX.app;
  G.co.cash+=cashRev-dPay-fuel;
  G.fin.cur.rev+=rev;G.fin.cur.cashRev+=cashRev;G.fin.cur.creditRev+=crRev;G.fin.cur.appRev+=apRev;
  G.fin.cur.dPay+=dPay;G.fin.cur.fuel+=fuel;
  if(G.time.getHours()===0){
    G.eco.fuel=Math.round(Math.max(140,Math.min(210,G.eco.fuel+(Math.random()-.5)*4))*10)/10;
    G.eco.elec=Math.round(Math.max(22,Math.min(38,G.eco.elec+(Math.random()-.5)*.8))*10)/10;
  }
  if(Math.random()<.0008){const c=comply(G);if(!c.all){G.co.cash-=500000;addN('danger','抜き打ち監査：違反。罰則金¥50万');}else addN('info','抜き打ち監査：問題なし ✓');}
  if(G.co.cash<-100000000){G.phase='gameover';G.running=false;stopTick();addN('danger','資金枯渇 — 破産');}
}

function completeResearch(){
  const lv=G.av.researching.lv;G.av.level=lv;G.av.researching=null;
  const def=AV_LEVELS.find(a=>a.lv===lv);
  addN('info',`✅ 自動運転 ${def.name} の研究完了！`);
  if(lv===5){G.phase='clear';G.running=false;stopTick();addN('info','🏆 完全自動運転を達成！タクシー帝国の完成！');}
}

function onMonthEnd(){
  const b=G.fin.cur;
  const vmo=G.vehicles.reduce((a,v)=>a+v.mo,0);
  const fmo=G.depots.reduce((a,d)=>a+d.mo,0);
  const sal=G.staff.reduce((a,p)=>a+p.salary,0);
  const socialIns=Math.round(sal*SI_RATE);
  const hasMaint=G.depots.some(d=>d.built?.maintshop);
  const maint=Math.round(G.vehicles.reduce((a,v)=>a+(v.mileage/1000)*VM[v.modelId].price*(hasMaint?.0008:.001),0));
  let depreciation=0;
  G.vehicles=G.vehicles.map(v=>{
    if(v.acquired!=='purchase')return v;
    const dep=(v.purchasePrice||0)/48;depreciation+=dep;
    return{...v,bookValue:Math.max(0,(v.bookValue||0)-dep)};
  });
  depreciation=Math.round(depreciation);
  let loanInterest=0,loanPrincipal=0;
  G.loans=G.loans.map(l=>{
    if(l.remaining<=0)return l;
    const interest=l.remaining*(0.025/12),principal=Math.min(l.monthly-interest,l.remaining);
    loanInterest+=Math.round(interest);loanPrincipal+=Math.round(principal);
    G.co.cash-=Math.round(interest+principal);G.cfAccum.loanPrincipal+=Math.round(principal);
    return{...l,remaining:Math.max(0,l.remaining-principal)};
  }).filter(l=>l.remaining>0.01);
  const prevArNet=Math.round(G.ar.credit*(1-PAY_FEE.credit)+G.ar.app*(1-PAY_FEE.app));
  G.co.cash+=prevArNet;G.cfAccum.arSettled+=prevArNet;
  const arFees=Math.round(b.creditRev*PAY_FEE.credit+b.appRev*PAY_FEE.app);
  b.arFees=arFees;G.ar={credit:Math.round(b.creditRev),app:Math.round(b.appRev)};
  G.co.cash-=vmo+fmo+sal+socialIns+maint;
  b.vmo=vmo;b.fmo=fmo;b.sal=sal;b.socialIns=socialIns;b.maint=maint;b.depreciation=depreciation;b.loanInterest=loanInterest;
  b.profit=Math.round(b.rev-b.dPay-b.fuel-vmo-fmo-sal-socialIns-maint-depreciation-loanInterest-arFees);
  G.cfAccum.opCashIn+=Math.round(b.cashRev)+prevArNet;G.cfAccum.opCashOut+=b.dPay+b.fuel+vmo+fmo+sal+socialIns+maint+loanInterest;
  G.fin.hist.push(b);G.fin.cur=newBucket(G.time);
  G.taxes.ctAccrued+=Math.round(b.rev*.036);G.taxes.corpFYProfit+=b.profit;
  const nm=G.time.getMonth();
  if([3,6,9,0].includes(nm)&&G.taxes.ctAccrued>0){
    const ct=Math.round(G.taxes.ctAccrued);G.co.cash-=ct;G.taxes.ctPaid+=ct;G.taxes.ctAccrued=0;
    G.cfAccum.opCashOut+=ct;G.taxes.history.push({type:'消費税',amount:ct,date:new Date(G.time)});addN('warn',`消費税 納付: ${yen(ct)}`);
  }
  if(nm===3&&G.phase==='operating'){
    const ct=calcCorpTax(G.taxes.corpFYProfit);G.co.cash-=ct;G.taxes.corpPaid+=ct;
    G.cfAccum.opCashOut+=ct;G.taxes.history.push({type:'法人税等',amount:ct,date:new Date(G.time)});
    addN('warn',`法人税等 申告: ${yen(ct)}`);G.taxes.corpFYProfit=0;
  }
  const nextMo=G.time.getMonth();
  const diff=((SEASONAL[nextMo]-SEASONAL[(nextMo+11)%12])/SEASONAL[(nextMo+11)%12]*100).toFixed(0);
  addN(SEASONAL[nextMo]>=1.0?'info':'warn',`${SEASONAL[nextMo]>=1.0?'📈':'📉'} ${SEASON_LBL[nextMo]}（×${SEASONAL[nextMo].toFixed(2)}、前月比${diff>0?'+':''}${diff}%）`);
  updateCompetitors();
  G.candidates=genCandidates(10);
  G.staff=G.staff.map(p=>({...p,stats:{...p.stats,motivation:clamp(p.stats.motivation+(p.vehicleId?(Math.random()*4-1):-3),10,100)}}));
  addN(b.profit>=0?'info':'warn',`${b.month} 決算: ${b.profit>=0?'利益':'損失'} ${yen(Math.abs(b.profit))}`);
  if(G.co.cash<-100000000){G.phase='gameover';G.running=false;stopTick();addN('danger','資金枯渇 — 破産');}
}

function updateCompetitors(){
  const myVc=G.vehicles.filter(v=>v.driverId).length;
  G.competitors=G.competitors.map(c=>{
    const grow=Math.random()<c.aggression*.3,shrink=Math.random()<.08;
    const vChange=grow?rnd(0,3):shrink?-rnd(0,1):0;
    const newV=Math.max(1,c.vehicles+vChange);
    const total=myVc+G.competitors.reduce((a,x)=>a+x.vehicles,0);
    const newShare=total>0?parseFloat((newV/total*100).toFixed(1)):c.share;
    if(Math.abs(vChange)>1)addN('info',`${c.name}: 車両${vChange>0?'+'+vChange:vChange}台（計${newV}台）`);
    return{...c,vehicles:newV,share:newShare,trend:newShare-c.share};
  });
}

function selDepot(i){G.selDepotIdx=i;render();}

function buyFac(fid){
  const depot=G.depots[G.selDepotIdx];const f=FAC_CATALOG[fid];if(!f)return;
  if(f.req&&!depot.built[f.req]){addN('warn',`先に「${FAC_CATALOG[f.req].name}」を確保してください`);return;}
  if(G.co.cash<f.price){addN('warn','資金が不足しています');return;}
  G.co.cash-=f.price;depot.mo+=f.mo;depot.built[fid]=true;G.cfAccum.facPurchase+=f.price;
  if(f.cap>0&&f.cap>depot.garageCapacity)depot.garageCapacity=f.cap;
  if(fid==='rest')depot.hasRest=true;
  addN('info',`${depot.name}: ${f.name} を確保 (${yen(f.price)})`);render();
}

function expandGarage(){
  const depot=G.depots[G.selDepotIdx];const n=depot.extraGarages||0;
  const cost=Math.round(30000000*Math.pow(1.3,n));const mo=Math.round(800000*Math.pow(1.2,n));
  if(G.co.cash<cost){addN('warn','資金が不足しています');return;}
  askConfirm(`${depot.name} 第${n+2}車庫増設（+50台）\n初期費用 ${yen(cost)}、月額 ${yen(mo)}`,()=>{
    G.co.cash-=cost;depot.garageCapacity+=50;depot.mo+=mo;depot.extraGarages=(depot.extraGarages||0)+1;G.cfAccum.facPurchase+=cost;
    addN('info',`${depot.name} 増設 +50台`);});
}

function openDepot(){
  const sel=document.getElementById('newDepotArea');if(!sel)return;
  const areaId=sel.value;const area=AREAS.find(a=>a.id===areaId);if(!area)return;
  if(G.depots.some(d=>d.areaId===areaId)){addN('warn','この地区には既に営業所があります');return;}
  if(G.co.cash<area.fee){addN('warn','資金が不足しています');return;}
  askConfirm(`${area.name}に新営業所を開設しますか？\n開設費用: ${yen(area.fee)}`,()=>{
    G.co.cash-=area.fee;G.cfAccum.facPurchase+=area.fee;
    const d=mkDepot(areaId);G.depots.push(d);G.selDepotIdx=G.depots.length-1;
    addN('info',`${d.name} を開設しました`);});
}

function acquireVehicle(mid,acq){
  const m=VM[mid];const upfront=acq==='purchase'?m.price:0;const mo=acq==='purchase'?m.buyMo:m.leaseMo;
  const depot=G.depots.find(d=>d.id===G.buyDepotId)||G.depots[0];
  if(G.co.cash<upfront){addN('warn','資金が不足しています');return;}
  if(depot.garageCapacity===0){addN('warn',`${depot.name}の車庫を先に確保してください`);return;}
  const depotVehicles=G.vehicles.filter(v=>v.depotId===depot.id).length;
  if(depotVehicles>=depot.garageCapacity){addN('warn',`${depot.name}の収容台数が上限です`);return;}
  G.co.cash-=upfront;if(acq==='purchase')G.cfAccum.vPurchase+=upfront;
  G.vehicles.push({id:uid(),modelId:mid,acquired:acq,mo,mileage:0,cond:100,driverId:null,totalRev:0,depotId:depot.id,purchasePrice:acq==='purchase'?m.price:0,bookValue:acq==='purchase'?m.price:0});
  addN('info',`${depot.name}: ${m.name} ${acq==='lease'?`リース 月額${yen(mo)}`:`購入 ${yen(upfront)}`}`);render();
}

function reassignVehicle(vid,depotId){
  G.vehicles=G.vehicles.map(v=>v.id===vid?{...v,depotId}:v);render();
}

function sellVehicle(vid){
  const v=G.vehicles.find(x=>x.id===vid);if(!v)return;
  const m=VM[v.modelId],isL=v.acquired==='lease',val=isL?0:Math.round(m.price*.5*(v.cond/100));
  askConfirm(`${m.name} を${isL?'リース解約':'売却'}しますか？${val>0?` (${yen(val)})`:'(返却金なし)'}`,()=>{
    if(v.driverId)G.staff=G.staff.map(p=>p.id===v.driverId?{...p,vehicleId:null}:p);
    G.vehicles=G.vehicles.filter(x=>x.id!==vid);G.co.cash+=val;if(!isL)G.cfAccum.vSale+=val;
    addN('info',`${m.name} ${isL?'リース解約':'売却'}${val>0?` (${yen(val)})`:''}`)});
}

function hireStaff(cid){
  const c=G.candidates.find(x=>x.id===cid);if(!c)return;
  G.staff.push({...c,roles:['driver'],vehicleId:null,hireDate:new Date(G.time)});
  G.candidates=G.candidates.filter(x=>x.id!==cid);addN('info',`${c.name} を採用`);render();
}
function fireStaff(sid){
  const p=G.staff.find(x=>x.id===sid);if(!p)return;
  askConfirm(`${p.name} を解雇しますか？`,()=>{
    if(p.vehicleId)G.vehicles=G.vehicles.map(v=>v.id===p.vehicleId?{...v,driverId:null}:v);
    G.staff=G.staff.filter(x=>x.id!==sid);addN('info',`${p.name} を解雇`);});
}
function toggleRole(sid,role){G.staff=G.staff.map(p=>{if(p.id!==sid)return p;const roles=p.roles.includes(role)?p.roles.filter(r=>r!==role):[...p.roles,role];return{...p,roles};});render();}
function assignVehicle(sid,vid){
  G.staff=G.staff.map(p=>{if(p.vehicleId===vid&&p.id!==sid)return{...p,vehicleId:null};if(p.id===sid)return{...p,vehicleId:vid||null};return p;});
  G.vehicles=G.vehicles.map(v=>{if(v.driverId===sid)return{...v,driverId:null};if(v.id===vid)return{...v,driverId:sid};return v;});render();
}
function applyPermit(){
  if(!comply(G).all){addN('warn','全要件を満たしてから申請してください');return;}
  const nameEl=document.getElementById('coNameInput');const name=(nameEl?.value||'').trim();
  if(!name){addN('warn','申請社名を入力してください');return;}
  G.co.name=name;G.phase='applied';G.permitApplied=new Date(G.time);
  const ap=new Date(G.time);ap.setMonth(ap.getMonth()+2);G.permitReady=ap;
  addN('info',`「${name}」として許可申請を提出（中国運輸局 広島運輸支局）。許可予定: ${ap.getFullYear()}/${ap.getMonth()+1}月`);render();
}
function takeLoan(idx){
  const p=LOAN_PRESETS[idx];if(!p)return;
  const mo=loanMonthly(p.amount,p.term);
  askConfirm(`${p.label} (月返済${yen(mo)}・金利2.5%) で融資申請しますか？`,()=>{
    G.loans.push({id:uid(),label:p.label,amount:p.amount,remaining:p.amount,monthly:mo,term:p.term,startDate:new Date(G.time)});
    G.co.cash+=p.amount;G.cfAccum.loanIn+=p.amount;addN('info',`銀行融資 ${yen(p.amount)} 実行（月返済${yen(mo)}）`);});
}
function repayExtra(lid){
  const loan=G.loans.find(l=>l.id===lid);if(!loan)return;
  const el=document.getElementById('repay-'+lid);const amt=parseInt(el?.value||'0')*10000;
  if(!amt||amt<=0){addN('warn','返済額を入力してください（万円）');return;}
  if(amt>G.co.cash){addN('warn','現金が不足しています');return;}
  if(amt>loan.remaining){addN('warn','返済額が残高を超えています');return;}
  G.co.cash-=amt;loan.remaining-=amt;G.cfAccum.loanPrincipal+=amt;
  if(loan.remaining<1000){G.loans=G.loans.filter(l=>l.id!==lid);addN('info','ローンを完済しました');}
  else addN('info',`繰上返済 ${yen(amt)} (残高${yen(loan.remaining)})`);render();
}

function startResearch(lv){
  if(G.av.researching){addN('warn','現在研究中です');return;}
  if(G.av.level>=lv){addN('warn','既に研究済みです');return;}
  if(G.av.level!==lv-1){addN('warn','前レベルの研究が必要です');return;}
  const def=AV_LEVELS.find(a=>a.lv===lv);if(!def)return;
  if(G.co.cash<def.cost){addN('warn','資金が不足しています');return;}
  askConfirm(`${def.name}\n研究費用: ${yen(def.cost)}\n研究期間: 約${def.months}ヶ月\n\n研究を開始しますか？`,()=>{
    G.co.cash-=def.cost;G.av.invested+=def.cost;G.cfAccum.facPurchase+=def.cost;
    const cd=new Date(G.time);cd.setMonth(cd.getMonth()+def.months);
    G.av.researching={lv,completeDate:cd};
    addN('info',`🔬 ${def.name} の研究を開始 (${yen(def.cost)})`);});
}

function saveGame(){
  try{
    const blob=new Blob([JSON.stringify(G,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download=`taxi-empire-${G.time.getFullYear()}${String(G.time.getMonth()+1).padStart(2,'0')}.json`;
    a.click();URL.revokeObjectURL(url);
    addN('info','💾 セーブデータをエクスポートしました');render();
  }catch(e){addN('danger','セーブに失敗しました');render();}
}
function loadGame(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const raw=JSON.parse(ev.target.result,(k,v)=>{
          if(typeof v==='string'&&/^\d{4}-\d{2}-\d{2}T/.test(v))return new Date(v);
          return v;
        });
        // 旧バージョン互換: depots が無い場合は G.fac から変換
        if(!raw.depots){
          const d={id:uid(),areaId:'naka',name:'本社営業所',mult:1.0,...(raw.fac||{}),built:raw.fac?.built||{},garageCapacity:raw.fac?.garageCapacity||0,mo:raw.fac?.mo||0,hasRest:raw.fac?.hasRest||false,extraGarages:raw.fac?.extraGarages||0};
          raw.depots=[d];raw.vehicles=(raw.vehicles||[]).map(v=>({...v,depotId:d.id}));
        }
        if(!raw.av)raw.av={level:0,researching:null,invested:0};
        if(raw.selDepotIdx===undefined)raw.selDepotIdx=0;
        if(!raw.buyDepotId)raw.buyDepotId=raw.depots[0].id;
        G=raw;render();addN('info','📂 セーブデータを読み込みました');
      }catch(err){addN('danger','読み込みに失敗: '+err.message);render();}
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetGame(){askConfirm('ゲームをリセットしますか？（全データが消えます）',()=>{stopTick();G=initState();});}
function addN(type,msg){G.notifs.unshift({id:G.nid++,type,msg,time:new Date(G.time)});if(G.notifs.length>80)G.notifs.pop();}
function toggleNotif(){G.showNotif=!G.showNotif;render();}
function setTab(t){G.tab=t;render();}
function setStaffTab(t){G.staffTab=t;render();}
function setFinTab(t){G.finTab=t;render();}
function askConfirm(msg,action){G._confirm={msg,action};render();}
function confirmYes(){if(G._confirm){const a=G._confirm.action;G._confirm=null;a();}else render();}

  const[pl,pc]=phases[G.phase]||['不明','pb-setup'];
  document.getElementById('phasedsp').innerHTML=`<span class="pbadge ${pc}">${pl}</span>`;
  const mo=G.time.getMonth(),sm=SEASONAL[mo];const scarr=sm>=1.1?'🔥':sm>=1.0?'📈':sm>=0.9?'😐':'❄️';
  document.getElementById('seasondsp').innerHTML=`<span class="season-badge">${scarr} ${SEASON_LBL[mo].slice(0,8)} ×${sm.toFixed(2)}</span>`;

  document.getElementById('sright').textContent=`粗利${yen(net)} AR${yen(G.ar.credit+G.ar.app)} ⛽¥${G.eco.fuel.toFixed(1)}`;
  const np=document.getElementById('np');np.style.display=G.showNotif?'flex':'none';
  document.getElementById('nlist').innerHTML=G.notifs.length===0?'<div style="text-align:center;padding:20px;color:var(--sub);font-size:12px">通知なし</div>':G.notifs.map(n=>`<div class="ni"><div class="nd nd-${n.type}"></div><div><div class="nt">${n.msg}</div><div class="ntm">${fmt(n.time)}</div></div></div>`).join('');
  const views={compliance:vCompliance,staff:vStaff,vehicles:vVehicles,facility:vFacility,tech:vTech,finance:vFinance,market:vMarket};
  document.getElementById('main').innerHTML=(views[G.tab]||vCompliance)();
  let co=document.getElementById('confirmOverlay');
  if(G._confirm){if(!co){co=document.createElement('div');co.id='confirmOverlay';co.className='overlay';document.getElementById('app').appendChild(co);}co.innerHTML=`<div class="md"><div class="md-title">確認</div><div style="font-size:13px;color:var(--sub);margin-bottom:16px;white-space:pre-line">${G._confirm.msg}</div><div style="display:flex;gap:8px"><button class="btn btn-d" style="flex:1" onclick="confirmYes()">はい</button><button class="btn btn-s" style="flex:1" onclick="confirmNo()">キャンセル</button></div></div>`;}else if(co)co.remove();
  let go=document.getElementById('gomModal');

    go=document.createElement('div');go.id='gomModal';go.className='overlay';

    go.innerHTML=`<div class="md"><div class="md-title">${isWin?'🏆 ゲームクリア！':'破産 💸'}</div><div style="font-size:13px;color:var(--sub);margin-bottom:16px">${isWin?`完全自動運転 Lv.5 を達成しました！<br>タクシー帝国の完成です！<br><br>累計売上: ${yen(G.fin.hist.reduce((a,b)=>a+b.rev,0))}<br>累計利益: ${yen(G.fin.hist.reduce((a,b)=>a+(b.profit||0),0))}`:`資金がマイナス1億円を超えました。<br>累計売上: ${yen(G.fin.hist.reduce((a,b)=>a+b.rev,0)+G.fin.cur.rev)}`}</div><button class="btn btn-p btn-bl" onclick="resetGame()">もう一度挑戦する</button></div>`;
    document.getElementById('app').appendChild(go);

  const groups=FAC_GROUPS.map(g=>{const items=g.items.map(fid=>{const f=FAC_CATALOG[fid];const done=!!built[fid];const locked=f.req&&!built[f.req];return`<div class="fac-item ${done?'done':locked?'locked':''}"><div style="font-weight:600;font-size:12px">${done?'✅ ':locked?'🔒 ':''}${f.name}</div><div style="font-size:10px;color:var(--sub);margin:2px 0">${f.desc}</div><div style="font-size:11px">${f.cap>0?`+${f.cap}台 ・ `:''}初期${yen(f.price)} 月${f.mo?yen(f.mo):'なし'}</div>${locked?`<div style="font-size:10px;color:var(--amber);margin-top:3px">→先に「${FAC_CATALOG[f.req].name}」</div>`:done?'':`<button class="btn btn-p btn-sm" style="margin-top:5px;width:100%" onclick="buyFac('${fid}')" ${G.co.cash<f.price?'disabled':''}>取得</button>`}</div>`;}).join('');return`<div class="card"><div class="ct">${g.label}</div><div class="fac-grid">${items}</div></div>`;}).join('');

function vTech(){
  const av=G.av;
  const researchDef=av.researching?AV_LEVELS.find(a=>a.lv===av.researching.lv):null;
  let progressPct=0;
  if(av.researching&&researchDef){
    const cd=new Date(av.researching.completeDate);
    const totalMs=researchDef.months*30*24*3600*1000;
    const elapsed=totalMs-(cd-G.time);
    progressPct=Math.min(100,Math.max(0,elapsed/totalMs*100));
  }
  const curDef=av.level>0?AV_LEVELS.find(a=>a.lv===av.level):null;
  const overview=`<div class="card"><div class="ct">🤖 自動運転技術ツリー</div>
    <div class="sg">
      <div class="sb"><div class="sl">現在のAVレベル</div><div class="sv">${av.level>0?`Lv.${av.level}`:'未研究'}</div></div>
      <div class="sb"><div class="sl">累計研究投資</div><div class="sv">${yen(av.invested)}</div></div>
    </div>
    ${curDef?`<div class="ib ib-purple">✅ ${curDef.name} 有効中<br>${curDef.desc}</div>`:''}
    ${av.researching&&researchDef?`<div class="ib ib-warn">🔬 研究中: ${researchDef.name}<br>完成予定: ${new Date(av.researching.completeDate).getFullYear()}/${String(new Date(av.researching.completeDate).getMonth()+1).padStart(2,'0')}月（▶ で時間を進めてください）<br><div style="height:6px;background:#f0f0f3;border-radius:3px;overflow:hidden;margin-top:6px"><div style="height:100%;width:${progressPct.toFixed(0)}%;background:var(--amber);border-radius:3px"></div></div></div>`:''}
  </div>`;
  const nodes=AV_LEVELS.map(def=>{
    const done=av.level>=def.lv,active=av.researching?.lv===def.lv,locked=av.level<def.lv-1,canR=av.level===def.lv-1&&!av.researching;
    const statusTag=done?'<span style="color:var(--green);font-weight:600">✅ 完了</span>':active?'<span style="color:var(--amber);font-weight:600">🔬 研究中</span>':locked?'<span style="color:var(--sub)">🔒 前段階が必要</span>':'<span style="color:var(--sub)">研究可能</span>';
    const btn=canR?`<button class="btn btn-p btn-sm" style="margin-top:8px;width:100%" onclick="startResearch(${def.lv})" ${G.co.cash<def.cost?'disabled':''}>研究開始 (${yen(def.cost)})</button>`:done||active?'':locked?`<div style="font-size:10px;color:var(--sub);margin-top:5px">🔒 Lv.${def.lv-1}の研究完了後に解放</div>`:'';
    return`<div class="av-node ${done?'done':active?'active':locked?'locked':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="font-weight:600;font-size:13px">${def.name}</div>
        ${statusTag}
      </div>
      <div style="font-size:11px;color:var(--sub);margin-bottom:6px">${def.desc}</div>
      <div style="font-size:11px;display:flex;flex-wrap:wrap;gap:8px;color:var(--sub)">
        <span>💰 ${yen(def.cost)}</span>
        <span>⏱ ${def.months}ヶ月</span>
        <span>⛽ 燃費×${def.fuelMult.toFixed(2)}</span>
        <span>🛡 劣化×${def.condMult.toFixed(2)}</span>
        <span>👤 必要運転手×${(def.driverRatio*100).toFixed(0)}%</span>
      </div>
      ${btn}
    </div>`;
  }).join('');
  return overview+nodes+`<div class="card"><div class="ct">自動運転の効果について</div><div style="font-size:12px;color:var(--sub);line-height:1.7">・研究費用は一括で支払われます<br>・研究期間中は時間を進める必要があります（▶ ボタン）<br>・Lv.3以降は法令タブの必要運転手数が減少します（コスト削減可能）<br>・Lv.5達成でゲームクリア（完全自動運転帝国の完成！）<br>・自動運転レベルは全営業所の全車両に一括適用されます</div></div>`;
}

function vFinance(){

    </div>`;
  }
  if(G.finTab==='bs'){

    const opNet=ca.opCashIn-ca.opCashOut+totDep;const invNet=-(ca.vPurchase+ca.facPurchase)+ca.vSale;const finNet=ca.loanIn-ca.loanPrincipal;
    return tabs+`<div class="card"><div class="ct">キャッシュフロー計算書 C/F（累計）</div>
      <div style="background:#f0f6ff;border-radius:6px;padding:7px;margin-bottom:6px"><div class="cf-row"><strong>Ⅰ 営業活動によるCF</strong></div><div class="cf-row cf-ind"><span>現金・即時収入</span><span>${yen(ca.opCashIn-ca.arSettled)}</span></div><div class="cf-row cf-ind"><span>未収金回収（手数料控除後）</span><span>${yen(ca.arSettled)}</span></div><div class="cf-row cf-ind"><span>営業支出合計</span><span style="color:var(--red)">-${yen(ca.opCashOut)}</span></div><div class="cf-row cf-ind"><span>減価償却費（非現金加算）</span><span>${yen(totDep)}</span></div><div class="cf-sub"><span>営業CF計</span><span style="color:${opNet>=0?'var(--green)':'var(--red)'}">${yen(opNet)}</span></div></div>
      <div style="background:#f0fff4;border-radius:6px;padding:7px;margin-bottom:6px"><div class="cf-row"><strong>Ⅱ 投資活動によるCF</strong></div><div class="cf-row cf-ind"><span>車両取得</span><span style="color:var(--red)">-${yen(ca.vPurchase)}</span></div><div class="cf-row cf-ind"><span>車両売却収入</span><span>${yen(ca.vSale)}</span></div><div class="cf-row cf-ind"><span>施設・研究投資</span><span style="color:var(--red)">-${yen(ca.facPurchase)}</span></div><div class="cf-sub"><span>投資CF計</span><span style="color:${invNet>=0?'var(--green)':'var(--red)'}">${yen(invNet)}</span></div></div>
      <div style="background:#fff8f0;border-radius:6px;padding:7px;margin-bottom:6px"><div class="cf-row"><strong>Ⅲ 財務活動によるCF</strong></div><div class="cf-row cf-ind"><span>銀行借入</span><span>${yen(ca.loanIn)}</span></div><div class="cf-row cf-ind"><span>借入元金返済</span><span style="color:var(--red)">-${yen(ca.loanPrincipal)}</span></div><div class="cf-sub"><span>財務CF計</span><span style="color:${finNet>=0?'var(--green)':'var(--red)'}">${yen(finNet)}</span></div></div>
      <div style="border-top:2px solid var(--border);padding-top:5px;display:flex;justify-content:space-between;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums"><span>フリーCF（Ⅰ+Ⅱ）</span><span style="color:${(opNet+invNet)>=0?'var(--green)':'var(--red)'}">${yen(opNet+invNet)}</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;margin-top:4px"><span>期間純増減（Ⅰ+Ⅱ+Ⅲ）</span><span style="color:${(opNet+invNet+finNet)>=0?'var(--green)':'var(--red)'}">${yen(opNet+invNet+finNet)}</span></div></div>`;
  }
  if(G.finTab==='loan'){
    const loanList=G.loans.length===0?'<div style="text-align:center;padding:10px;color:var(--sub);font-size:12px">借入なし</div>':G.loans.map(l=>`<div class="loan-row"><div style="font-weight:600">${l.label}</div><div class="loan-meta"><span>残高 ${yen(l.remaining)}</span><span>月返済 ${yen(l.monthly)}</span><span>残約${Math.max(0,Math.ceil(l.remaining/l.monthly))}ヶ月</span></div><div style="display:flex;gap:5px;margin-top:6px;align-items:center"><input type="number" id="repay-${l.id}" placeholder="繰上返済額(万円)" style="padding:4px 6px;font-size:11px"><button class="btn btn-s btn-sm" onclick="repayExtra('${l.id}')">繰上返済</button></div></div>`).join('');
    const opts=LOAN_PRESETS.map((p,i)=>`<option value="${i}">${p.label} → 月${yen(loanMonthly(p.amount,p.term))}</option>`).join('');
    return tabs+ov+`<div class="card"><div class="ct">借入管理 <span style="font-size:10px;color:var(--sub)">金利 年2.5%・元利均等</span></div>${loanList}<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px"><div style="font-size:12px;color:var(--sub);margin-bottom:5px">新規融資申請</div><select id="loanPresetSel" style="margin-bottom:5px">${opts}</select><button class="btn btn-p btn-sm btn-bl" onclick="takeLoan(parseInt(document.getElementById('loanPresetSel').value))">融資申請</button></div></div>`;
  }
  if(G.finTab==='tax'){
    const salTotal=G.staff.reduce((a,p)=>a+p.salary,0);const siTotal=Math.round(salTotal*SI_RATE);
    const estCorp=calcCorpTax(G.taxes.corpFYProfit);
    const nm=G.time.getMonth();const qM=[2,5,8,11];const nq=qM.find(q=>q>nm)??2;const nqYr=nq<nm?G.time.getFullYear()+1:G.time.getFullYear();
    const taxHist=G.taxes.history.length===0?'<div style="font-size:11px;color:var(--sub)">納税履歴なし</div>':G.taxes.history.slice().reverse().slice(0,8).map(t=>`<div class="fr"><span class="fi">${fmt(t.date).slice(0,7)} ${t.type}</span><span style="color:var(--red)">-${yen(t.amount)}</span></div>`).join('');
    return tabs+`<div class="card"><div class="ct">社会保険料（事業主負担 月額）</div><div class="ib ib-info" style="margin-bottom:6px">協会けんぽ広島 2024年度 事業主負担率合計: 約16.835%</div><div class="fr"><span>給与総額</span><span>${yen(salTotal)}</span></div>${SI_DETAIL.map(d=>`<div class="fr fi"><span>- ${d.label} (${d.rate}%)</span><span>${yen(Math.round(salTotal*d.rate/100))}</span></div>`).join('')}<div class="fd"></div><div class="fr"><strong>月額合計（事業主負担）</strong><strong style="color:var(--red)">${yen(siTotal)}</strong></div></div>
    <div class="card"><div class="ct">消費税（四半期納付）</div><div class="fr"><span>今期累積</span><span>${yen(G.taxes.ctAccrued)}</span></div><div class="fr"><span>次回納付予定</span><span>${nqYr}/${String(nq+1).padStart(2,'0')}末</span></div><div class="fr"><span>累計納付済</span><span>${yen(G.taxes.ctPaid)}</span></div></div>
    <div class="card"><div class="ct">法人税等（3月決算）</div><div class="fr"><span>当期累積利益（FY）</span><span style="color:${G.taxes.corpFYProfit>=0?'var(--green)':'var(--red)'}">${yen(G.taxes.corpFYProfit)}</span></div><div class="fr"><span>推定税額</span><span style="color:var(--red)">${yen(estCorp)}</span></div><div class="fr"><span>累計納付済</span><span>${yen(G.taxes.corpPaid)}</span></div></div>
    <div class="card"><div class="ct">納税履歴</div>${taxHist}</div>`;
  }
  return tabs+ov;
}

function vMarket(){
  const myVc=G.vehicles.filter(v=>v.driverId).length;
  const mo=G.time.getMonth(),sm=SEASONAL[mo];
  const allComp=G.competitors;const compTot=parseFloat(allComp.reduce((a,c)=>a+c.share,0).toFixed(1));
  const totalVc=myVc+allComp.reduce((a,c)=>a+c.vehicles,0);
  const myShare=totalVc>0?parseFloat((myVc/totalVc*100).toFixed(1)):0;
  const others=parseFloat(Math.max(0,100-myShare-compTot).toFixed(1));
  const segs=[{name:G.co.name,share:myShare,color:'#0071e3'},...allComp.map(c=>({name:c.name,share:c.share,color:c.color})),{name:'その他',share:others,color:'#ccc'}];
  const barSegs=segs.map(s=>`<div style="height:100%;width:${s.share}%;background:${s.color}"></div>`).join('');
  const legend=segs.map(s=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px"><div style="width:10px;height:10px;background:${s.color};border-radius:2px;flex-shrink:0"></div><span>${s.name}</span><strong>${s.share}%</strong></div>`).join('');
  const calRows=Array.from({length:12},(_,i)=>{const s=SEASONAL[i];const w=Math.round((s-0.75)*333);const isNow=i===mo;return`<div style="display:flex;align-items:center;gap:6px;padding:2px 0;${isNow?'font-weight:700':''}"><span style="width:20px;font-size:11px;text-align:right">${i+1}月</span><div style="flex:1;height:12px;background:#f0f0f3;border-radius:3px;overflow:hidden"><div style="height:100%;width:${clamp(w,2,100)}%;background:${s>=1.2?'#e53935':s>=1.0?'#43a047':s>=0.9?'#fb8c00':'#1e88e5'};border-radius:3px"></div></div><span style="font-size:10px;width:28px;text-align:right;font-variant-numeric:tabular-nums">${s.toFixed(2)}</span><span style="font-size:10px">${s>=1.2?'🔥':s>=1.0?'📈':s>=0.9?'😐':'❄️'}</span><span style="font-size:10px;color:var(--sub)">${isNow?'◀ 現在':''}</span></div>`;}).join('');
  const compCards=allComp.map(c=>{const tStr=c.trend>0.05?`<span style="color:var(--red)">▲${c.trend.toFixed(1)}%</span>`:c.trend<-0.05?`<span style="color:var(--green)">▼${Math.abs(c.trend).toFixed(1)}%</span>`:'<span style="color:var(--sub)">−</span>';return`<div class="comp-card"><div style="font-weight:600;font-size:13px"><span style="display:inline-block;width:10px;height:10px;background:${c.color};border-radius:2px;margin-right:5px;vertical-align:middle"></span>${c.name}</div><div style="font-size:11px;color:var(--sub)">車両${c.vehicles}台 ・ シェア${c.share}% ${tStr} ・ ${c.aggression>.5?'⚠️ 積極型':'😐 安定型'}</div><div class="cbar" style="margin-top:5px"><div class="cbar-f" style="width:${Math.min(100,c.share*2)}%;background:${c.color}"></div></div></div>`;}).join('');
  const depotInfo=G.depots.map(d=>{const dVc=G.vehicles.filter(v=>v.depotId===d.id&&v.driverId).length;return`<div class="fr"><span>${d.name} (×${d.mult.toFixed(2)})</span><span>稼働 ${dVc}台 / 保有 ${G.vehicles.filter(v=>v.depotId===d.id).length}台</span></div>`;}).join('');
  return`<div class="card"><div class="ct">広島市内・周辺 市場シェア</div>
    <div style="height:8px;background:#f0f0f3;border-radius:4px;overflow:hidden;margin-bottom:8px;display:flex;gap:1px">${barSegs}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">${legend}</div>
    <div style="font-size:11px;color:var(--sub)">市場全体 約${totalVc}台稼働</div>
    <div class="comp-card" style="border-color:var(--accent);margin-top:8px"><div style="font-weight:600;font-size:13px;color:var(--accent)">🚕 ${G.co.name}（自社） — シェア ${myShare}%</div>${depotInfo}</div></div>
  <div class="card"><div class="ct">競合各社</div>${compCards}</div>
  <div class="card"><div class="ct">年間需要カレンダー（季節変動係数）</div>
    <div class="ib ib-info" style="margin-bottom:6px">現在: <strong>${SEASON_LBL[mo]}（×${sm.toFixed(2)}）</strong><br>12月 ×1.40が最高値、8月 ×0.78が最低値（全タク連傾向に基づく）</div>
    ${calRows}</div>`;
}

render();
</script>
</body>
</html>
